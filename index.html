<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#1F3864">
<title>Beeran's Calculator Suite</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--nb:#1F3864;--na:#2F5496;--nh:#16294E;--ac:#1565C0;--bg:#EEF2F7;
  --cd:#fff;--ib:#EBF3FB;--rb:#D6E4F0;--tx:#1A202C;--mu:#718096;
  --bd:#CBD5E0;--ok:#276749;--f:'Segoe UI',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--f);background:var(--bg);color:var(--tx);display:flex;height:100vh;overflow:hidden}
#sb{width:220px;min-width:220px;background:var(--nb);display:flex;flex-direction:column;height:100vh;overflow:hidden;transition:transform .25s;z-index:100}
.logo{padding:18px 14px 12px;text-align:center;border-bottom:1px solid #2F5496}
.lt{font-size:15px;font-weight:700;color:#fff;line-height:1.5}
.ls{font-size:11px;color:#90C8F0;margin-top:3px}
.navarea{flex:1;overflow-y:auto;padding:6px 0}
.navarea::-webkit-scrollbar{width:4px}
.navarea::-webkit-scrollbar-thumb{background:#2F5496;border-radius:2px}
.nb{display:flex;align-items:center;gap:9px;width:calc(100% - 16px);margin:2px 8px;
  padding:9px 12px;background:transparent;border:none;color:#fff;
  font:600 13px var(--f);cursor:pointer;text-align:left;border-radius:6px;transition:background .15s}
.nb:hover{background:var(--nh)}
.nb.on{background:var(--na)}
.ic{width:18px;text-align:center;flex-shrink:0}
.sub{display:none;flex-direction:column}
.sub.open{display:flex}
.back{display:flex;align-items:center;gap:8px;width:calc(100% - 16px);margin:6px 8px 2px;
  padding:8px 12px;background:#16294E;border:none;color:#90C8F0;
  font:600 12px var(--f);cursor:pointer;border-radius:6px}
.grp{font-size:10px;color:#90C8F0;padding:8px 18px 2px;text-transform:uppercase;letter-spacing:.8px}
.sbot{padding:8px;border-top:1px solid #2F5496}
.spg{display:flex;align-items:center;gap:8px;width:100%;padding:9px 12px;
  background:var(--na);border:none;color:#fff;font:600 12px var(--f);
  cursor:pointer;border-radius:8px;margin-top:4px}
.spg:hover{background:var(--nh)}
.spg.alt{background:#16294E}
#ct{flex:1;overflow-y:auto}
.pg{padding:24px 28px;max-width:1100px}
.pt{font-size:22px;font-weight:700;color:var(--nb);margin-bottom:4px}
.ps{font-size:11px;color:var(--mu);margin-bottom:18px}
#hm{display:none;position:fixed;top:12px;left:12px;z-index:200;background:var(--nb);
  border:none;border-radius:8px;color:#fff;font-size:20px;width:40px;height:40px;cursor:pointer}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
.card{background:var(--cd);border-radius:10px;border:1px solid var(--bd);overflow:hidden;margin-bottom:14px}
.ch{background:var(--nb);color:#fff;font:700 11px var(--f);padding:8px 14px;text-transform:uppercase;letter-spacing:.5px}
.cb{padding:16px}
.t2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.fr label{font-size:12px;min-width:170px;flex-shrink:0}
input,select{font:13px var(--f);background:var(--ib);border:1px solid #B8CCE4;
  border-radius:6px;padding:7px 10px;color:var(--tx);width:100%;outline:none}
input:focus,select:focus{border-color:var(--ac);box-shadow:0 0 0 2px rgba(21,101,192,.15)}
.br{display:flex;gap:8px;margin-top:14px}
.btn{padding:8px 18px;border:none;border-radius:8px;font:700 12px var(--f);cursor:pointer}
.btn:hover{filter:brightness(1.1)}
.bc{background:var(--ac);color:#fff}
.bs{background:var(--bd);color:var(--tx);padding:6px 12px}
.rr{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #F0F4F8}
.rr:last-child{border-bottom:none}
.rl{font-size:11px;color:var(--mu)}
.rv{font-size:13px;font-weight:700}
.rv.a{color:var(--ac)}.rv.s{color:var(--ok)}
.rb{background:var(--rb);border-radius:8px;padding:14px 16px;margin-top:10px}
.cd2{background:#0D1B2A;color:#fff;font:400 28px 'Courier New',monospace;padding:14px;
  border-radius:8px;text-align:right;min-height:60px;word-break:break-all;margin-bottom:10px}
.ex{font-size:12px;color:#90C8F0;min-height:16px}
.cg{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.ck{padding:14px 6px;border:none;border-radius:8px;font:600 14px var(--f);cursor:pointer}
.ck:hover{filter:brightness(.9)}
.kn{background:#EBF3FB;color:var(--tx)}.ko{background:#2F5496;color:#fff}
.ke{background:var(--ac);color:#fff}.kf{background:#CBD5E0;color:var(--tx)}.k2{grid-column:span 2}
.tg{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:8px}
.tt{background:var(--ib);border:1px solid var(--bd);border-radius:10px;text-align:center;padding:10px 4px}
.tp{font:700 15px var(--f);color:var(--ac)}.ta{font-size:12px;margin-top:3px}
.ss{background:var(--nb);border-radius:10px;display:grid;grid-template-columns:repeat(3,1fr);margin-bottom:18px}
.sc{text-align:center;padding:18px 8px}
.sn2{font-size:34px;font-weight:700;color:#90C8F0}.sl{font-size:12px;color:#fff;margin-top:2px}
.cs{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 20px;text-align:center;color:var(--mu);min-height:300px}
.cs .ci{font-size:48px;margin-bottom:16px;opacity:.5}
.cs h3{font-size:18px;color:var(--nb);margin-bottom:8px}
.cs p{font-size:13px;max-width:340px;line-height:1.6}
.ac{background:var(--cd);border-radius:12px;border:1px solid var(--bd);padding:24px;margin-bottom:14px}
.qt{background:var(--rb);border-radius:8px;padding:14px 18px;font-style:italic;
  font-size:13px;color:var(--nb);margin:14px 0;line-height:1.6}
textarea{width:100%;font:13px var(--f);padding:10px;background:var(--ib);
  border:1px solid #B8CCE4;border-radius:8px;resize:vertical;min-height:100px;color:var(--tx);outline:none}
@media(max-width:700px){
  #hm{display:flex;align-items:center;justify-content:center}
  #sb{position:fixed;left:0;top:0;transform:translateX(-100%)}
  #sb.open{transform:translateX(0)}
  .ov.open{display:block}
  #ct{padding-top:52px}
  .pg{padding:14px}.t2{grid-template-columns:1fr}
  .tg{grid-template-columns:repeat(3,1fr)}.ss{grid-template-columns:1fr}
  .fr{flex-direction:column;align-items:flex-start}.fr label{min-width:unset}
}
</style>
</head>
<body>
<button id="hm" onclick="toggleSB()">&#9776;</button>
<div class="ov" id="ov" onclick="toggleSB()"></div>

<nav id="sb">
  <div class="logo">
    <div class="lt">&#129518; Beeran's</div>
    <div class="lt">Calculator Suite</div>
    <div class="ls">49 calculators &middot; 8 categories</div>
  </div>

  <div class="navarea" id="mainNav">
    <button class="nb" onclick="go(0)"><span class="ic">&#128290;</span>Basic Calculator</button>
    <button class="nb" onclick="go(1)"><span class="ic">&#128300;</span>Scientific &amp; Graph</button>
    <button class="nb" onclick="showSub('con')"><span class="ic">&#127959;</span>Construction</button>
    <button class="nb" onclick="showSub('cvt')"><span class="ic">&#128260;</span>Conversion</button>
    <button class="nb" onclick="showSub('elc')"><span class="ic">&#9889;</span>Electronics</button>
    <button class="nb" onclick="showSub('fin')"><span class="ic">&#128201;</span>Finance</button>
    <button class="nb" onclick="showSub('net')"><span class="ic">&#127760;</span>IT Networking</button>

  <div class="navarea sub" id="sub-con">
    <button class="back" onclick="hideSub()">&#8592; Back</button>
    <div class="grp">Construction</div>
    <button class="nb" onclick="go(2)" style="background:var(--ac);color:#fff;font-weight:700">&#11088; Master Calc</button>
    <button class="nb" onclick="go(3)">Area</button>
    <button class="nb" onclick="go(4)">Batten Spacing</button>
    <button class="nb" onclick="go(5)">Concrete Volume</button>
    <button class="nb" onclick="go(6)">Corner Angle</button>
    <button class="nb" onclick="go(7)">Crown Molding</button>
    <button class="nb" onclick="go(8)">Decking</button>
    <button class="nb" onclick="go(9)">Diagonal</button>
    <button class="nb" onclick="go(10)">Frame Spacing</button>
    <button class="nb" onclick="go(11)">Lumber</button>
    <button class="nb" onclick="go(12)">Miter Joint</button>
    <button class="nb" onclick="go(13)">Overlapping Boards</button>
    <button class="nb" onclick="go(14)">Parquet Floor</button>
    <button class="nb" onclick="go(15)">Ramp</button>
    <button class="nb" onclick="go(16)">Roofing</button>
    <button class="nb" onclick="go(17)">Slope</button>
    <button class="nb" onclick="go(18)">Stairs</button>
    <button class="nb" onclick="go(19)">Volume</button>
  </div>

  <div class="navarea sub" id="sub-cvt">
    <button class="back" onclick="hideSub()">&#8592; Back</button>
    <div class="grp">Conversion</div>
    <button class="nb" onclick="go(20)">Currency Converter</button>
    <button class="nb" onclick="go(21)">Time &amp; Date</button>
    <button class="nb" onclick="go(22)">Unit Converter</button>
  </div>

  <div class="navarea sub" id="sub-elc">
    <button class="back" onclick="hideSub()">&#8592; Back</button>
    <div class="grp">Electronics</div>
    <button class="nb" onclick="go(23)">Ohm's Law</button>
    <button class="nb" onclick="go(24)">Series &amp; Parallel</button>
    <button class="nb" onclick="go(25)">Voltage Divider</button>
  </div>

  <div class="navarea sub" id="sub-fin">
    <button class="back" onclick="hideSub()">&#8592; Back</button>
    <div class="grp">Finance</div>
    <button class="nb" onclick="go(26)">Amortization</button>
    <button class="nb" onclick="go(27)">Bill Splitter</button>
    <button class="nb" onclick="go(28)">Compound Interest</button>
    <button class="nb" onclick="go(29)">Credit Card Payoff</button>
    <button class="nb" onclick="go(30)">Depreciation</button>
    <button class="nb" onclick="go(31)">Loan</button>
    <button class="nb" onclick="go(32)">MACRS Full</button>
    <button class="nb" onclick="go(33)">MACRS Rate</button>
    <button class="nb" onclick="go(34)">Mortgage</button>
    <button class="nb" onclick="go(35)">ROI</button>
    <button class="nb" onclick="go(36)">Savings Goal</button>
  </div>

  <div class="navarea sub" id="sub-net">
    <button class="back" onclick="hideSub()">&#8592; Back</button>
    <div class="grp">IT Networking</div>
    <button class="nb" onclick="go(37)">Binary to Hex</button>
    <button class="nb" onclick="go(38)">IP Converter</button>
    <button class="nb" onclick="go(39)">IPv6 Calculator</button>
    <button class="nb" onclick="go(40)">Subnet / CIDR</button>

  <div class="navarea sub" id="sub-med">
    <button class="back" onclick="hideSub()">&#8592; Back</button>
    <div class="grp">Medical</div>
    <button class="nb" onclick="go(43)">BMI Calculator</button>
    <button class="nb" onclick="go(44)">Body Surface Area</button>
    <button class="nb" onclick="go(45)">Drug Dosage</button>
    <button class="nb" onclick="go(46)">IV Drip Rate</button>
    <button class="nb" onclick="go(47)">Opioid Conversion</button>
    <button class="nb" onclick="go(48)">Pharmacy Dilution</button>
  </div>

  <div class="sbot">
    <button class="spg" onclick="goPage('settings')">&#9881;&#65039; Settings</button>
    <button class="spg alt" onclick="goPage('about')">&#8505;&#65039; About</button>
  </div>
</nav>

<main id="ct"><div id="pg" class="pg"></div></main>
<script>
// Flat calc list — index matches onclick go(N)
var NAMES=[
  'Basic Calculator','Scientific Calculator',
  'Master Calc','Area','Batten Spacing','Concrete Volume','Corner Angle','Crown Molding',
  'Decking','Diagonal','Frame Spacing','Lumber','Miter Joint',
  'Overlapping Boards','Parquet Floor','Ramp','Roofing','Slope','Stairs','Volume',
  'Currency Converter','Time & Date','Unit Converter',
  "Ohm's Law",'Series & Parallel','Voltage Divider',
  'Amortization','Bill Splitter','Compound Interest','Credit Card Payoff',
  'Depreciation','Loan','MACRS Full','MACRS Rate','Mortgage','ROI','Savings Goal',
  'Binary to Hex','IP Converter','IPv6 Calculator','Subnet / CIDR',
  'Subnet Cheat Sheet','Supernet',
  'BMI Calculator','Body Surface Area','Drug Dosage',
  'IV Drip Rate','Opioid Conversion','Pharmacy Dilution'
];

var g=function(id){return document.getElementById(id);};
var gv=function(id){var e=g(id);return e?e.value:'';};
function fmtM(v){return '$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtN(v,d){if(!d)d=2;return Number(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});}
function rr(l,v,c){return '<div class="rr"><span class="rl">'+l+'</span><span class="rv'+(c?' '+c:'')+'">'+v+'</span></div>';}
function card(h,b){return '<div class="card"><div class="ch">'+h+'</div><div class="cb">'+b+'</div></div>';}

var activeSub='';
function showSub(id){
  g('mainNav').style.display='none';
  var subs=['con','cvt','elc','fin','net','med'];
  for(var i=0;i<subs.length;i++){
    var el=g('sub-'+subs[i]);
    if(el)el.classList.remove('open');
  }
  var s=g('sub-'+id);
  if(s){s.classList.add('open');activeSub=id;}
  // Don't closeMB() here — user still needs to pick a calculator
}
function hideSub(){
  g('mainNav').style.display='block';
  if(activeSub){var el=g('sub-'+activeSub);if(el)el.classList.remove('open');}
  activeSub='';
}

function go(idx){
  var name=NAMES[idx];
  // highlight
  var all=document.querySelectorAll('.nb');
  for(var i=0;i<all.length;i++)all[i].classList.remove('on');
  // find button with onclick go(idx) and highlight
  var allBtns=document.querySelectorAll('[onclick]');
  for(var i=0;i<allBtns.length;i++){
    if(allBtns[i].getAttribute('onclick')==='go('+idx+')'){
      allBtns[i].classList.add('on'); break;
    }
  }
  if(CALCS[name]){
    g('pg').innerHTML=CALCS[name].html();
    CALCS[name].init&&CALCS[name].init();
  }else{
    g('pg').innerHTML='<div class="cs"><div class="ci">&#128295;</div><h3>'+name+'</h3>'+
      '<p>Coming in the next release. The desktop app has all 49 calculators.</p></div>';
  }
  closeMB();
}

function goPage(p){
  var all=document.querySelectorAll('.nb');
  for(var i=0;i<all.length;i++)all[i].classList.remove('on');
  if(p==='about'){g('pg').innerHTML=aboutHTML();}
  if(p==='settings'){g('pg').innerHTML=settingsHTML();initSettings();}
  closeMB();
}

var CALCS={};

CALCS['Basic Calculator']={
  html:function(){return(
    '<h1 class="pt">&#128290; Basic Calculator</h1><p class="ps">Full keyboard support</p>'+
    '<div style="max-width:320px">'+
    '<div class="cd2"><div class="ex" id="be">&nbsp;</div><div id="bd">0</div></div>'+
    '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-bottom:3px">'+ 
    '<button style="background:#E2E8F0;color:#1A202C;border:none;border-radius:6px;padding:8px 4px;font-size:13px;cursor:pointer;font-family:Segoe UI,sans-serif;font-weight:700;" onclick="bc_mc()">MC</button>'+
    '<button style="background:#E2E8F0;color:#1A202C;border:none;border-radius:6px;padding:8px 4px;font-size:13px;cursor:pointer;font-family:Segoe UI,sans-serif;font-weight:700;" onclick="bc_ms()">MS</button>'+
    '<button style="background:#E2E8F0;color:#1A202C;border:none;border-radius:6px;padding:8px 4px;font-size:13px;cursor:pointer;font-family:Segoe UI,sans-serif;font-weight:700;" onclick="bc_mp()">M+</button>'+
    '<button style="background:#E2E8F0;color:#1A202C;border:none;border-radius:6px;padding:8px 4px;font-size:13px;cursor:pointer;font-family:Segoe UI,sans-serif;font-weight:700;" onclick="bc_mm()">M&#8722;</button>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-bottom:3px">'+ 
    '<button id="bc0" style="background:#CBD5E0;color:#1A202C;border:none;border-radius:6px;padding:4px;font-size:11px;cursor:pointer;font-family:Segoe UI,sans-serif;font-weight:600;white-space:pre-line;text-align:center;" onclick="bc_mr(0)">MR 1\n\u2014</button>'+
    '<button id="bc1" style="background:#CBD5E0;color:#1A202C;border:none;border-radius:6px;padding:4px;font-size:11px;cursor:pointer;font-family:Segoe UI,sans-serif;font-weight:600;white-space:pre-line;text-align:center;" onclick="bc_mr(1)">MR 2\n\u2014</button>'+
    '<button id="bc2" style="background:#CBD5E0;color:#1A202C;border:none;border-radius:6px;padding:4px;font-size:11px;cursor:pointer;font-family:Segoe UI,sans-serif;font-weight:600;white-space:pre-line;text-align:center;" onclick="bc_mr(2)">MR 3\n\u2014</button>'+
    '<button id="bc3" style="background:#CBD5E0;color:#1A202C;border:none;border-radius:6px;padding:4px;font-size:11px;cursor:pointer;font-family:Segoe UI,sans-serif;font-weight:600;white-space:pre-line;text-align:center;" onclick="bc_mr(3)">MR 4\n\u2014</button>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-bottom:6px">'+ 
    '<button id="bc4" style="background:#CBD5E0;color:#1A202C;border:none;border-radius:6px;padding:4px;font-size:11px;cursor:pointer;font-family:Segoe UI,sans-serif;font-weight:600;white-space:pre-line;text-align:center;" onclick="bc_mr(4)">MR 5\n\u2014</button>'+
    '<button id="bc5" style="background:#CBD5E0;color:#1A202C;border:none;border-radius:6px;padding:4px;font-size:11px;cursor:pointer;font-family:Segoe UI,sans-serif;font-weight:600;white-space:pre-line;text-align:center;" onclick="bc_mr(5)">MR 6\n\u2014</button>'+
    '<button id="bc6" style="background:#CBD5E0;color:#1A202C;border:none;border-radius:6px;padding:4px;font-size:11px;cursor:pointer;font-family:Segoe UI,sans-serif;font-weight:600;white-space:pre-line;text-align:center;" onclick="bc_mr(6)">MR 7\n\u2014</button>'+
    '<button id="bc7" style="background:#CBD5E0;color:#1A202C;border:none;border-radius:6px;padding:4px;font-size:11px;cursor:pointer;font-family:Segoe UI,sans-serif;font-weight:600;white-space:pre-line;text-align:center;" onclick="bc_mr(7)">MR 8\n\u2014</button>'+
    '</div>'+
    '<div class="cg">'+
    '<button class="ck kf" data-k="AC">AC</button>'+
    '<button class="ck kf" data-k="+/-">+/&#8722;</button>'+
    '<button class="ck kf" data-k="%">%</button>'+
    '<button class="ck ko" data-k="/">&divide;</button>'+
    '<button class="ck kn" data-k="7">7</button>'+
    '<button class="ck kn" data-k="8">8</button>'+
    '<button class="ck kn" data-k="9">9</button>'+
    '<button class="ck ko" data-k="*">&times;</button>'+
    '<button class="ck kn" data-k="4">4</button>'+
    '<button class="ck kn" data-k="5">5</button>'+
    '<button class="ck kn" data-k="6">6</button>'+
    '<button class="ck ko" data-k="-">&#8722;</button>'+
    '<button class="ck kn" data-k="1">1</button>'+
    '<button class="ck kn" data-k="2">2</button>'+
    '<button class="ck kn" data-k="3">3</button>'+
    '<button class="ck ko" data-k="+">+</button>'+
    '<button class="ck kn k2" data-k="0">0</button>'+
    '<button class="ck kn" data-k=".">.</button>'+
    '<button class="ck ke" data-k="=">=</button>'+
    '</div></div>');},
  init:function(){
    var cur='0',expr='',op='',prev='',fresh=false;
    window.bc_s={mem:[0,0,0,0,0,0,0,0]};
    window.bc_upd_m=function(){
      for(var i=0;i<8;i++){
        var b=document.getElementById('bc'+i);if(!b)continue;
        b.textContent='MR '+(i+1)+'\n'+(bc_s.mem[i]?(''+bc_s.mem[i]).substring(0,8):'\u2014');
        b.style.background=bc_s.mem[i]?'#1F3864':'#CBD5E0';
        b.style.color=bc_s.mem[i]?'#fff':'#1A202C';
      }
    };
    window.bc_mc=function(){bc_s.mem=[0,0,0,0,0,0,0,0];bc_upd_m();};
    window.bc_ms=function(){var v=parseFloat(cur)||0;
      for(var i=0;i<8;i++){if(!bc_s.mem[i]){bc_s.mem[i]=v;bc_upd_m();return;}}
      bc_s.mem[0]=v;bc_upd_m();};
    window.bc_mp=function(){for(var i=7;i>=0;i--){if(bc_s.mem[i]){bc_s.mem[i]+=parseFloat(cur)||0;bc_upd_m();return;}}};
    window.bc_mm=function(){for(var i=7;i>=0;i--){if(bc_s.mem[i]){bc_s.mem[i]-=parseFloat(cur)||0;bc_upd_m();return;}}};
    window.bc_mr=function(i){if(bc_s.mem[i]){cur=''+bc_s.mem[i];fresh=true;dsp();}};
    function dsp(){g('bd').textContent=cur;g('be').textContent=expr||'\u00a0';}
    function bc(k){
      if((k>='0'&&k<='9')||k==='.'){
        if(k==='.'&&cur.indexOf('.')>=0)return;
        cur=((fresh||cur==='0')&&k!=='.')?k:(cur+k);fresh=false;
      }else if('+-*/'.indexOf(k)>=0){
        if(op&&!fresh){try{cur=''+new Function('return '+prev+op+cur)();}catch(e){}}
        prev=cur;op=k;expr=cur+' '+(k==='*'?'x':k)+' ';fresh=true;
      }else if(k==='='){
        if(!op)return;
        try{expr=cur+' =';cur=''+new Function('return '+prev+op+cur)();op='';prev='';fresh=true;}
        catch(e){cur='Error';}
      }else if(k==='AC'){cur='0';expr='';op='';prev='';fresh=false;}
      else if(k==='+/-'){cur=cur[0]==='-'?cur.slice(1):'-'+cur;}
      else if(k==='%'){try{cur=''+parseFloat(cur)/100;}catch(e){}}
      dsp();
    }
    g('pg').addEventListener('click',function(e){
      var b=e.target.closest('[data-k]');if(b)bc(b.getAttribute('data-k'));
    });
    document.onkeydown=function(e){
      var m={'Enter':'=','Backspace':'AC','Escape':'AC'};
      var k=m[e.key]||e.key;
      if('0123456789.+-*/='.indexOf(k)>=0||k==='AC')bc(k);
    };
    dsp();
  }
};

    h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:4px">';
    h+=btn(fs,'AC',"mc_ac()")+btn(fs,'CE',"mc_ce()")+btn(os,'Dec',"mc_dec()",'mc-dec')+btn(eq,'=',"mc_eq()")+'</div>';
    h+='</div>';
    return h;
  },
  init:function(){
    window.mc_s={inp:'0',val:0,prev:null,op:null,fresh:true,unit:null,expr:'',
                 pitch:null,rise:null,run:null,diag:null,mem:[0,0,0,0,0,0,0,0],dec:true};
    function gcd(a,b){return b?gcd(b,a%b):a;}
    window.mc_frac=function(x){
      if(Math.abs(x)<1e-10)return'0';
      var sg=x<0?'-':'';x=Math.abs(x);
      var bn=Math.round(x),bd=1,be=Math.abs(x-bn);
      for(var d=2;d<=10000;d++){var n=Math.round(x*d),e=Math.abs(x-n/d);if(e<be){be=e;bn=n;bd=d;}if(e<1e-10)break;}
      var g=gcd(bn,bd);bn=Math.round(bn/g);bd=Math.round(bd/g);
      var w=Math.floor(bn/bd),r=bn%bd;
      if(bd===1)return sg+w;if(w===0)return sg+r+'/'+bd;return sg+w+' '+r+'/'+bd;
    };
    window.mc_fmt=function(v,u){
      var FR={yds:1/3,feet:1,inch:12,m:0.3048,cm:30.48,mm:304.8};
      var L={yds:' yd',feet:' ft',inch:' in',m:' m',cm:' cm',mm:' mm'};
      var x=u?v*FR[u]:v,lbl=u?L[u]:'';
      if(mc_s.dec||u==='m'||u==='cm'||u==='mm')return(+x.toPrecision(6)).toString()+lbl;
      return mc_frac(x)+lbl;
    };
    window.mc_upd=function(){
      var de=document.getElementById('mc-e'),dd=document.getElementById('mc-d');
      if(!de||!dd)return;
      var mode=mc_s.dec?' [DEC]':' [FRAC]';
      if(mc_s.fresh||mc_s.inp==='0'){dd.textContent=mc_fmt(mc_s.val,mc_s.unit);de.textContent=(mc_s.expr||'\u2015')+mode;}
      else{de.textContent=mc_s.inp+mode;dd.textContent=mc_s.inp;}
      for(var i=0;i<8;i++){var b=document.getElementById('mc-m'+i);if(b)b.textContent='MR '+(i+1)+'\n'+(mc_s.mem[i]?mc_fmt(mc_s.mem[i],mc_s.unit).substring(0,8):'\u2014');}
      var db=document.getElementById('mc-dec');if(db){db.textContent=mc_s.dec?'Dec':'Frac';db.style.background=mc_s.dec?'#2F5496':'#1F3864';}
    };
    window.mc_parse=function(t){
      t=t.trim();if(!t||t==='0')return 0;
      try{
        if(t.indexOf('/')>=0){var si=t.indexOf('/'),np=t.substring(0,si),ds=t.substring(si+1),d=parseFloat(ds)||1,w=0,fn=0;
          if(np.indexOf('.')>=0){var di=np.indexOf('.');w=parseFloat(np.substring(0,di))||0;fn=parseFloat(np.substring(di+1))||0;}
          else fn=parseFloat(np)||0;return w+fn/d;}
        return parseFloat(t)||0;
      }catch(e){return 0;}
    };
    var TF={yds:3,feet:1,inch:1/12,m:3.28084,cm:0.0328084,mm:0.00328084};
    window.mc_cur=function(){if(!mc_s.fresh&&mc_s.inp!=='0')return mc_parse(mc_s.inp)*TF[mc_s.unit||'feet'];return mc_s.val;};
    window.mc_raw=function(){if(!mc_s.fresh&&mc_s.inp!=='0')return mc_parse(mc_s.inp);return mc_s.val;};
    window.mc_ap=function(a,b,o){if(o==='+')return a+b;if(o==='-')return a-b;if(o==='x')return a*b;if(o==='/')return b?a/b:0;return b;};
    var SYM={'+':'+','-':'\u2212','x':'\u00d7','/':'\u00f7'};
    window.mc_dgt=function(d){if(mc_s.fresh){mc_s.inp=d;mc_s.fresh=false;}else if(mc_s.inp==='0'&&d!=='.')mc_s.inp=d;else mc_s.inp+=d;mc_upd();};
    window.mc_dot=function(){if(mc_s.fresh){mc_s.inp='0.';mc_s.fresh=false;}else if(mc_s.inp.indexOf('.')<0)mc_s.inp+='.';mc_upd();};
    window.mc_frs=function(){if(mc_s.dec)mc_s.dec=false;if(mc_s.fresh){mc_s.inp='0/';mc_s.fresh=false;}else if(mc_s.inp.indexOf('/')<0)mc_s.inp+='/';mc_upd();};
    window.mc_bk=function(){if(mc_s.fresh||mc_s.inp==='0'){mc_s.val=0;mc_s.fresh=true;mc_s.inp='0';}else mc_s.inp=mc_s.inp.slice(0,-1)||'0';mc_upd();};
    window.mc_ac=function(){mc_s.inp='0';mc_s.val=0;mc_s.prev=null;mc_s.op=null;mc_s.fresh=true;mc_s.expr='';mc_s.pitch=null;mc_s.rise=null;mc_s.run=null;mc_s.diag=null;mc_upd();};
    window.mc_ce=function(){mc_s.inp='0';mc_s.fresh=false;mc_upd();};
    window.mc_op=function(o){var v=mc_s.unit===null?mc_raw():mc_cur();mc_s.val=v;mc_s.prev=v;mc_s.op=o;mc_s.inp='0';mc_s.fresh=true;mc_s.expr=mc_fmt(v,mc_s.unit)+' '+SYM[o];mc_upd();};
    window.mc_eq=function(){
      var v=mc_s.unit===null?mc_raw():mc_cur();
      if(mc_s.op&&mc_s.prev!==null){mc_s.expr=mc_fmt(mc_s.prev,mc_s.unit)+' '+SYM[mc_s.op]+' '+mc_fmt(v,mc_s.unit)+' =';mc_s.val=mc_ap(mc_s.prev,v,mc_s.op);mc_s.prev=null;mc_s.op=null;}
      else{mc_s.val=v;mc_s.expr=mc_fmt(v,mc_s.unit);}
      mc_s.inp='0';mc_s.fresh=true;mc_upd();
    };
    window.mc_unit=function(u){
      mc_s.unit=u;
      if(!mc_s.fresh&&mc_s.inp!=='0'){
        var raw=mc_parse(mc_s.inp),vf=raw*TF[u];
        if(mc_s.op&&mc_s.prev!==null){mc_s.expr=mc_fmt(mc_s.prev,u)+' '+SYM[mc_s.op]+' '+mc_fmt(vf,u)+' =';mc_s.val=mc_ap(mc_s.prev,vf,mc_s.op);mc_s.prev=null;mc_s.op=null;}
        else{mc_s.val=vf;mc_s.expr=mc_fmt(vf,u);}
        mc_s.inp='0';mc_s.fresh=true;
      }
      mc_upd();
    };
    window.mc_prd=function(pt){
      if(!mc_s.fresh&&mc_s.inp!=='0'){var vf=mc_parse(mc_s.inp)*TF[mc_s.unit||'feet'];mc_s[pt]=vf;mc_s.expr=pt.charAt(0).toUpperCase()+pt.slice(1)+' = '+mc_fmt(vf,mc_s.unit);mc_s.val=vf;mc_s.inp='0';mc_s.fresh=true;mc_upd();return;}
      var p=mc_s.pitch,ri=mc_s.rise,ru=mc_s.run,di=mc_s.diag,rv=null;
      try{
        if(pt==='pitch'&&ri!==null&&ru){mc_s.pitch=(ri/ru)*12;mc_s.val=mc_s.pitch;mc_s.expr='Pitch = '+mc_fmt(mc_s.pitch,null);}
        else if(pt==='rise'){rv=(p!==null&&ru!==null)?ru*(p/12):(di!==null&&ru!==null)?Math.sqrt(Math.max(0,di*di-ru*ru)):null;if(rv!==null){mc_s.rise=rv;mc_s.val=rv;mc_s.expr='Rise = '+mc_fmt(rv,mc_s.unit);}}
        else if(pt==='run'){rv=(p!==null&&ri!==null&&p)?ri/(p/12):(di!==null&&ri!==null)?Math.sqrt(Math.max(0,di*di-ri*ri)):null;if(rv!==null){mc_s.run=rv;mc_s.val=rv;mc_s.expr='Run = '+mc_fmt(rv,mc_s.unit);}}
        else if(pt==='diag'){rv=(ri!==null&&ru!==null)?Math.sqrt(ri*ri+ru*ru):(p!==null&&ru!==null)?Math.sqrt(Math.pow(ru*(p/12),2)+ru*ru):null;if(rv!==null){mc_s.diag=rv;mc_s.val=rv;mc_s.expr='Diag = '+mc_fmt(rv,mc_s.unit);}}
      }catch(e){}
      mc_s.inp='0';mc_s.fresh=true;mc_upd();
    };
    window.mc_mrcl=function(i){mc_s.val=mc_s.mem[i];mc_s.fresh=true;mc_s.inp='0';mc_upd();};
    window.mc_msto=function(i){mc_s.mem[i]=mc_s.unit===null?mc_raw():mc_cur();mc_upd();};
    window.mc_mc=function(){mc_s.mem=[0,0,0,0,0,0,0,0];mc_upd();};
    window.mc_ms=function(){for(var i=0;i<8;i++){if(!mc_s.mem[i]){mc_s.mem[i]=mc_s.unit===null?mc_raw():mc_cur();mc_upd();return;}}mc_s.mem[0]=mc_s.unit===null?mc_raw():mc_cur();mc_upd();};
    window.mc_mp=function(){var v=mc_s.unit===null?mc_raw():mc_cur();for(var i=7;i>=0;i--){if(mc_s.mem[i]){mc_s.mem[i]+=v;mc_upd();return;}}mc_s.mem[0]+=v;mc_upd();};
    window.mc_mm=function(){var v=mc_s.unit===null?mc_raw():mc_cur();for(var i=7;i>=0;i--){if(mc_s.mem[i]){mc_s.mem[i]-=v;mc_upd();return;}}};
    window.mc_pn=function(){if(!mc_s.fresh)mc_s.inp=mc_s.inp.charAt(0)==='-'?mc_s.inp.slice(1):'-'+mc_s.inp;else mc_s.val=-mc_s.val;mc_upd();};
    window.mc_dec=function(){mc_s.dec=!mc_s.dec;mc_upd();};
    mc_upd();
  }
};

CALCS['Area']={
  html:function(){return(
    '<h1 class="pt">Area Calculator</h1><p class="ps">Rectangle, circle, triangle and more</p>'+
    '<div class="t2">'+
    card('SHAPE',
      '<div class="fr"><label>Shape</label>'+
      '<select id="ash"><option>Rectangle</option><option>Square</option>'+
      '<option>Circle</option><option>Triangle</option><option>Trapezoid</option></select></div>'+
      '<div id="afl"></div>'+
      '<div class="br"><button class="btn bc" id="acalc">Calculate</button>'+
      '<button class="btn bs" id="acl">Clear</button></div>')+
    card('RESULTS','<div id="ares"><div class="rr"><span class="rl">Fill in dimensions</span><span class="rv">&mdash;</span></div></div>')+
    '</div>');},
  init:function(){
    var S={Rectangle:[['Length','al'],['Width','aw']],Square:[['Side','as']],
      Circle:[['Radius','ar']],Triangle:[['Base','ab'],['Height','ah']],
      Trapezoid:[['Base 1','ab1'],['Base 2','ab2'],['Height','aht']]};
    function render(){
      var s=gv('ash'),h='',f=S[s];
      for(var i=0;i<f.length;i++)h+='<div class="fr"><label>'+f[i][0]+'</label><input id="'+f[i][1]+'" type="number" placeholder="0"></div>';
      g('afl').innerHTML=h;
    }
    function calc(){
      var s=gv('ash'),a=NaN,p=NaN;
      try{
        if(s==='Rectangle'){var l=+gv('al'),w=+gv('aw');a=l*w;p=2*(l+w);}
        else if(s==='Square'){var x=+gv('as');a=x*x;p=4*x;}
        else if(s==='Circle'){var r=+gv('ar');a=Math.PI*r*r;p=2*Math.PI*r;}
        else if(s==='Triangle'){a=.5*+gv('ab')*+gv('ah');}
        else if(s==='Trapezoid'){a=.5*(+gv('ab1')+(+gv('ab2')))*+gv('aht');}
      }catch(e){}
      g('ares').innerHTML=rr('Area',isNaN(a)?'&mdash;':fmtN(a)+' ft\u00b2','a')+
        (isNaN(p)?'':rr('Perimeter',fmtN(p)+' ft'))+
        (isNaN(a)?'':rr('Area (m\u00b2)',fmtN(a*.0929)+' m\u00b2'));
    }
    g('ash').addEventListener('change',render);
    g('pg').addEventListener('click',function(e){
      if(e.target.id==='acalc')calc();
      if(e.target.id==='acl'){var ins=g('afl').querySelectorAll('input');for(var i=0;i<ins.length;i++)ins[i].value='';}
    });
    g('pg').addEventListener('input',function(e){if(e.target.id!=='ash')calc();});
    render();
  }
};

CALCS['Currency Converter']={

  init:function(){

    g('pg').addEventListener('change',function(e){if('cfr cto'.indexOf(e.target.id)>=0)calc();});
    calc();
  }
};

      '<div class="fr"><label>Resistance R (ohms)</label><input id="or" type="number" placeholder="blank"></div>'+
      '<div class="fr"><label>Power P (watts)</label><input id="op" type="number" placeholder="blank"></div>'+
      '<div class="br"><button class="btn bc" id="ocl">Clear</button></div>')+
    card('RESULTS','<div id="ors"><div class="rr"><span class="rl">Fill in two values</span></div></div>')+

  init:function(){
    function nv(id){var v=gv(id);return(v!==''&&!isNaN(+v))?+v:null;}
    function calc(){
      var V=nv('ov'),I=nv('oi'),R=nv('or'),P=nv('op'),v=V,i=I,r=R,p=P;
      if(v&&i){r=v/i;p=v*i;}else if(v&&r){i=v/r;p=v*v/r;}else if(v&&p){i=p/v;r=v*v/p;}
      else if(i&&r){v=i*r;p=i*i*r;}else if(i&&p){v=p/i;r=p/(i*i);}
      else if(r&&p){v=Math.sqrt(p*r);i=Math.sqrt(p/r);}
      else{g('ors').innerHTML='<div class="rr"><span class="rl">Fill in two values</span></div>';return;}
      function f(x){return x<.001?fmtN(x*1e6,3)+' u':x<1?fmtN(x*1000,3)+' m':fmtN(x,4)+' ';}
      g('ors').innerHTML=rr('Voltage',f(v)+'V','a')+rr('Current',f(i)+'A')+rr('Resistance',f(r)+'&#937;')+rr('Power',f(p)+'W');
    }
    g('pg').addEventListener('input',calc);
    g('pg').addEventListener('click',function(e){if(e.target.id==='ocl'){['ov','oi','or','op'].forEach(function(id){g(id)&&(g(id).value='');});}});

};

  init:function(){

    function rebuild(){
      var n=Math.max(1,Math.min(20,+gv('bnum')||2));
      var base=Math.floor(1000/n)/10,rem=Math.round((100-base*n)*10)/10;
      cv=[];for(var i=0;i<n;i++)cv.push(i===0?Math.round((base+rem)*10)/10:base);
      var h='';
      for(var i=0;i<cv.length;i++){

          '<span style="font-size:11px;color:var(--mu)">%</span>'+
          '<span style="font-size:12px;font-weight:600;color:var(--ac)" id="bpr'+i+'">&mdash;</span></div>';
      }
      g('brows').innerHTML=h;upd();calc();
    }
    function upd(){
      var t=0;for(var i=0;i<cv.length;i++)t+=cv[i];t=Math.round(t*10)/10;
      g('bptot').textContent='Total: '+t+'%';g('bptot').style.color=Math.abs(t-100)<.05?'var(--ok)':'#C53030';
    }
    function calc(){
      var a=+gv('bamt')||0,t=+gv('btip')||0,n=Math.max(1,+gv('bnum')||2),ta=a*t/100,gr=a+ta;
      g('bres').innerHTML=rr('Tip',fmtM(ta))+rr('Grand Total',fmtM(gr),'a')+
        '<div style="height:6px"></div>'+rr('Subtotal/Person',fmtM(a/n))+rr('Tip/Person',fmtM(ta/n))+rr('Total/Person',fmtM(gr/n),'a');
      var th='';[5,10,15,18,20].forEach(function(p){th+='<div class="tt"><div class="tp">'+p+'%</div><div class="ta">'+fmtM(a*p/100)+'</div></div>';});
      g('btips').innerHTML=th;
      if(mode()==='cu')cv.forEach(function(p,i){var e=g('bpr'+i);if(e)e.textContent=fmtM(gr*p/100);});
    }
    g('pg').addEventListener('click',function(e){if(e.target.id==='bcalc')calc();});
    g('pg').addEventListener('change',function(e){
      if(e.target.name==='bm'){g('bcust').style.display=mode()==='cu'?'block':'none';if(mode()==='cu')rebuild();else calc();}

    });
    rebuild();
  }
};

CALCS['Subnet / CIDR']={
  html:function(){return(
    '<h1 class="pt">Subnet / CIDR</h1><p class="ps">IPv4 network analysis</p>'+
    '<div class="t2">'+
    card('INPUT',
      '<div class="fr"><label>IP / CIDR</label><input id="snip" type="text" value="192.168.1.0/24"></div>'+
      '<div class="br"><button class="btn bc" id="sncalc">Calculate</button>'+
      '<button class="btn bs" id="snsmp">Sample</button></div>')+
    card('DETAILS','<div id="snres"><div class="rr"><span class="rl">Enter CIDR above</span></div></div>')+
    '</div>');},
  init:function(){
    function calc(){
      try{
        var p=gv('snip').split('/'),ipS=p[0].trim(),pf=parseInt(p[1]);
        if(isNaN(pf)||pf<0||pf>32)throw new Error('Bad prefix');
        var o=ipS.split('.').map(Number);if(o.length!==4)throw new Error('Bad IP');
        var ipN=(((o[0]*256+o[1])*256+o[2])*256+o[3])>>>0;
        var mask=(pf===0?0:((-1)<<(32-pf)))>>>0;
        var net=(ipN&mask)>>>0,bcast=(net|(~mask>>>0))>>>0,hosts=Math.max(0,bcast-net-1);
        function ip(n){return[(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.');}
        function mk(m){return[(m>>>24)&255,(m>>>16)&255,(m>>>8)&255,m&255].join('.');}
        g('snres').innerHTML=rr('Network',ip(net),'a')+rr('Mask',mk(mask))+rr('Broadcast',ip(bcast))+
          rr('First',pf>=31?'N/A':ip(net+1))+rr('Last',pf>=31?'N/A':ip(bcast-1))+
          rr('Hosts',hosts.toLocaleString(),'a')+rr('CIDR',ip(net)+'/'+pf)+rr('Class',o[0]<128?'A':o[0]<192?'B':'C');
      }catch(e){g('snres').innerHTML='<div class="rr"><span class="rl" style="color:#C53030">'+e.message+'</span></div>';}
    }
    g('pg').addEventListener('click',function(e){if(e.target.id==='sncalc')calc();if(e.target.id==='snsmp'){g('snip').value='10.0.0.0/8';calc();}});
    g('pg').addEventListener('keydown',function(e){if(e.key==='Enter')calc();});
    calc();
  }
};

CALCS['Compound Interest']={
  html:function(){return(
    '<h1 class="pt">Compound Interest</h1><p class="ps">The power of compounding</p>'+
    '<div class="t2">'+
    card('INPUTS',
      '<div class="fr"><label>Principal ($)</label><input id="cip" type="number" value="10000"></div>'+
      '<div class="fr"><label>Annual Rate (%)</label><input id="cir" type="number" value="7" step="0.1"></div>'+
      '<div class="fr"><label>Years</label><input id="cit" type="number" value="10"></div>'+
      '<div class="fr"><label>Compounds / Year</label>'+
      '<select id="cin"><option value="1">Annually</option><option value="2">Semi-annually</option>'+
      '<option value="4">Quarterly</option><option value="12" selected>Monthly</option>'+
      '<option value="365">Daily</option></select></div>'+
      '<div class="fr"><label>Monthly Contribution</label><input id="cic" type="number" value="0"></div>'+
      '<div class="br"><button class="btn bc" id="cicalc">Calculate</button></div>')+
    card('RESULTS','<div id="cirs"></div>')+
    '</div>');},
  init:function(){
    function calc(){
      var P=+gv('cip'),r=+gv('cir')/100,t=+gv('cit'),n=+gv('cin'),c=+gv('cic');
      if(!P||r<=0||t<=0)return;
      var base=P*Math.pow(1+r/n,n*t),contrib=c>0?c*(Math.pow(1+r/n,n*t)-1)/(r/n):0,total=base+contrib;
      var inv=P+c*12*t;
      g('cirs').innerHTML=rr('Final Balance',fmtM(total),'a')+rr('Principal',fmtM(P))+
        rr('Contributions',fmtM(c*12*t))+rr('Interest',fmtM(total-inv),'s')+rr('Return',fmtN((total/inv-1)*100,1)+'%');
    }
    g('pg').addEventListener('click',function(e){if(e.target.id==='cicalc')calc();});
    g('pg').addEventListener('input',calc);g('pg').addEventListener('change',calc);
    calc();
  }
};

  init:function(){
    window._sc_expr='';window._sc_deg=true;
    window.sc_s={mem:[0,0,0,0,0,0,0,0]};
    window.sc_upd_m=function(){
      for(var i=0;i<8;i++){
        var b=document.getElementById('sc'+i);if(!b)continue;
        b.textContent='MR '+(i+1)+'\n'+(sc_s.mem[i]?(''+sc_s.mem[i]).substring(0,8):'\u2014');
        b.style.background=sc_s.mem[i]?'#1F3864':'#CBD5E0';
        b.style.color=sc_s.mem[i]?'#fff':'#1A202C';
      }
    };
    function scCurVal(){try{var v=parseFloat(g('sd').textContent);return isNaN(v)?0:v;}catch(e){return 0;}}
    window.sc_mc=function(){sc_s.mem=[0,0,0,0,0,0,0,0];sc_upd_m();};
    window.sc_ms=function(){var v=scCurVal();
      for(var i=0;i<8;i++){if(!sc_s.mem[i]){sc_s.mem[i]=v;sc_upd_m();return;}}
      sc_s.mem[0]=v;sc_upd_m();};
    window.sc_mp=function(){for(var i=7;i>=0;i--){if(sc_s.mem[i]){sc_s.mem[i]+=scCurVal();sc_upd_m();return;}}};
    window.sc_mm=function(){for(var i=7;i>=0;i--){if(sc_s.mem[i]){sc_s.mem[i]-=scCurVal();sc_upd_m();return;}}};
    window.sc_mr=function(i){if(sc_s.mem[i]){window._sc_expr=''+sc_s.mem[i];sc_dsp();}};
    window.sc_dsp=function(){
      var d=g('sd'),e=g('se');if(!d||!e)return;
      d.textContent=window._sc_expr||'0';e.textContent=window._sc_deg?'DEG':'RAD';
      var db=g('sc-deg');if(db)db.textContent=window._sc_deg?'DEG':'RAD';
    };
    window.sc_deg=function(){window._sc_deg=!window._sc_deg;sc_dsp();};
    window.sc_k=function(k){
      if(k==='()')k='()';
      window._sc_expr+=k;sc_dsp();
    };
    window.sc_fn=function(fn){window._sc_expr+=fn+'(';sc_dsp();};
    window.sc_sq=function(){window._sc_expr='('+window._sc_expr+')^2';sc_dsp();};
    window.sc_inv=function(){window._sc_expr='1/('+window._sc_expr+')';sc_dsp();};
    window.sc_pi=function(){window._sc_expr+='\u03c0';sc_dsp();};
    window.sc_e=function(){window._sc_expr+='e';sc_dsp();};
    window.sc_fact=function(){window._sc_expr=window._sc_expr+'!';sc_dsp();};
    window.sc_bk=function(){window._sc_expr=window._sc_expr.slice(0,-1);sc_dsp();};
    window.sc_ac=function(){window._sc_expr='';sc_dsp();};
    window.sc_eq=function(){
      try{
        var expr=window._sc_expr;
        var deg=window._sc_deg;
        var t=deg?Math.PI/180:1,t2=deg?180/Math.PI:1;
        // Replace constants
        expr=expr.replace(/\u03c0/g,'Math.PI').replace(/\be\b/g,'Math.E');
        // Replace functions
        expr=expr.replace(/sin\(/g,'Math.sin(_d(').replace(/cos\(/g,'Math.cos(_d(').replace(/tan\(/g,'Math.tan(_d(');
        expr=expr.replace(/asin\(/g,'_r(Math.asin(').replace(/acos\(/g,'_r(Math.acos(').replace(/atan\(/g,'_r(Math.atan(');
        expr=expr.replace(/log\(/g,'Math.log10(').replace(/ln\(/g,'Math.log(').replace(/sqrt\(/g,'Math.sqrt(');
        expr=expr.replace(/pow\(/g,'Math.pow(');
        // Close double-close for inverse trig
        expr=expr.replace(/_r\(Math\.(asin|acos|atan)\(([^)]+)\)/g,function(m,fn,arg){return '_r(Math.'+fn+'('+arg+')';});
        // Handle ^ for pow
        expr=expr.replace(/([^\s]+)\^([^\s]+)/g,'Math.pow($1,$2)');
        // Handle factorial
        expr=expr.replace(/(\d+)!/g,function(m,n){var x=parseInt(n),r=1;for(var i=2;i<=x;i++)r*=i;return r;});
        var _d=function(x){return deg?x*Math.PI/180:x;};
        var _r=function(x){return deg?x*180/Math.PI:x;};
        var result=new Function('Math,_d,_r','return '+expr)(Math,_d,_r);
        g('se').textContent=window._sc_expr+' =';
        g('sd').textContent=parseFloat(result.toFixed(10))+'';
        window._sc_expr=''+parseFloat(result.toFixed(10));
      }catch(err){g('sd').textContent='Error';window._sc_expr='';}
    };
    sc_dsp();
  }
};

CALCS['Loan']={
  html:function(){return(

  init:function(){
    /* Newton-Raphson to find annual interest rate */
    function solveRate(nper,pmt,pv,comp){
      var r=0.01;
      for(var i=0;i<300;i++){
        var pw=Math.pow(1+r,nper);
        var f=pv*r*pw/(pw-1)-pmt;
        var r2=r+1e-7,pw2=Math.pow(1+r2,nper);
        var dfn=(pv*r2*pw2/(pw2-1)-pmt-f)/1e-7;
        if(Math.abs(dfn)<1e-15)break;
        var rn=r-f/dfn;
        if(rn<=0)rn=r/2;
        if(Math.abs(rn-r)<1e-10){r=rn;break;}
        r=rn;
      }
      return r*comp;
    }
    function calcIR(){
      var P=+gv('irP'),pmt=+gv('irPmt'),n=+gv('irN'),comp=+gv('irComp')||12;
      if(!P||!pmt||!n)return;
      try{
        var ann=solveRate(n,pmt,P,comp);
        var total=pmt*n,interest=total-P;
        g('irRes').innerHTML=
          rr('Annual Interest Rate',(ann*100).toFixed(4)+'%','a')+
          rr('Total Interest Amount',fmtM(interest))+
          rr('Total Principal',fmtM(P))+
          rr('Total Payment Amount',fmtM(total));
      }catch(e){g('irRes').innerHTML=rr('Result','Error — check inputs');}
    }
    function calcMP(){
      var P=+gv('mpP'),rAnn=+gv('mpR')/100,n=+gv('mpN'),comp=+gv('mpComp')||12;
      if(!P||!n)return;
      var r=rAnn/comp;
      var M=r>0?P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1):P/n;
      var total=M*n,interest=total-P;
      g('mpRes').innerHTML=
        rr('Monthly Payment',fmtM(M),'a')+
        rr('Total Interest Amount',fmtM(interest))+
        rr('Total Principal',fmtM(P))+
        rr('Total Payment Amount',fmtM(total));
    }
    function calcPC(){
      var n1=+gv('pcN1'),n2=+gv('pcN2');
      if(!n1)return;
      var r=(n1-n2)/n1*100;
      g('pcRes').innerHTML=rr('Percent Change',r.toFixed(4)+'%  ('+(r>=0?'increase':'decrease')+')', 'a');
    }
    function calcPO(){
      var p=+gv('poP'),n=+gv('poN');
      g('poRes').innerHTML=rr('Result',fmtN(p/100*n,4),'a');
    }
    g('pg').addEventListener('click',function(e){
      var id=e.target.id;
      if(id==='irCalc')calcIR();
      else if(id==='mpCalc')calcMP();
      else if(id==='pcCalc')calcPC();
      else if(id==='poCalc')calcPO();
      else if(id==='irClr'){['irP','irPmt','irN','irComp'].forEach(function(x){g(x).value='';});g('irRes').innerHTML='';}
      else if(id==='mpClr'){['mpP','mpR','mpN','mpComp'].forEach(function(x){g(x).value='';});g('mpRes').innerHTML='';}
      else if(id==='pcClr'){['pcN1','pcN2'].forEach(function(x){g(x).value='';});g('pcRes').innerHTML='';}
      else if(id==='poClr'){['poP','poN'].forEach(function(x){g(x).value='';});g('poRes').innerHTML='';}
    });
    /* auto-calc on input */
    g('pg').addEventListener('input',function(e){
      var id=e.target.id;
      if(['irP','irPmt','irN','irComp'].indexOf(id)>=0)calcIR();
      else if(['mpP','mpR','mpN','mpComp'].indexOf(id)>=0)calcMP();
      else if(['pcN1','pcN2'].indexOf(id)>=0)calcPC();
      else if(['poP','poN'].indexOf(id)>=0)calcPO();
    });
    calcIR();calcMP();calcPC();calcPO();
  }
};

CALCS['Credit Card Payoff']={
  html:function(){return(
    '<h1 class="pt">Credit Card Payoff</h1><p class="ps">How long until your balance is zero</p>'+
    '<div class="t2">'+
    card('CARD DETAILS',
      '<div class="fr"><label>Current Balance ($)</label><input id="ccB" type="number" value="5000"></div>'+
      '<div class="fr"><label>Annual APR (%)</label><input id="ccR" type="number" value="19.99" step="0.1"></div>'+
      '<div class="fr"><label>Monthly Payment ($)</label><input id="ccM" type="number" value="150"></div>'+
      '<div class="fr"><label>New Monthly Charges ($)</label><input id="ccC" type="number" value="0"></div>'+
      '<div class="br"><button class="btn bc" id="ccCalc">Calculate</button></div>')+
    card('RESULTS','<div id="ccRes"></div>')+
    '</div>');},
  init:function(){
    function calc(){
      var B=+gv('ccB'),apr=+gv('ccR')/100,M=+gv('ccM'),newChg=+gv('ccC');
      var r=apr/12;
      if(!B||M<=0)return;
      if(M<=B*r+newChg){
        g('ccRes').innerHTML='<div style="color:#C53030;font-weight:700;padding:12px 0">'+
          'Payment too low &mdash; balance will never reach zero.<br>Minimum to reduce balance: '+fmtM(B*r+newChg+0.01)+'</div>';return;
      }
      var bal=B,months=0,totalInt=0;
      while(bal>0.01&&months<600){
        var int=bal*r;totalInt+=int;bal=bal+int+newChg-M;
        if(bal<0)bal=0;months++;
      }
      var yrs=Math.floor(months/12),mos=months%12;
      g('ccRes').innerHTML=
        rr('Months to Payoff',months+' months ('+yrs+'y '+mos+'m)','a')+
        rr('Total Interest Paid',fmtM(totalInt),'s')+
        rr('Total Amount Paid',fmtM(B+totalInt))+
        rr('Interest % of Balance',fmtN(totalInt/B*100,1)+'%');

      if(!cost||!life||life<1)return;
      var basis=cost-salv,rows='',cum=0,book=cost;

      var totalDep=0,maxDep=basis;
      for(var yr=1;yr<=life;yr++){

      }

CALCS['Series & Parallel']={

    '</div>'+
    card('INDIVIDUAL BREAKDOWN','<div id="spBreak"></div>'));},
  init:function(){
    var count=3;
    function renderRows(){
      var h='';
      for(var i=0;i<count;i++){
        h+='<div class="fr"><label>R'+(i+1)+' (&#937;)</label>'+
          '<input id="spr'+i+'" type="number" placeholder="e.g. 100" value="'+(i===0?100:i===1?220:470)+'"></div>';
      }
      g('spRows').innerHTML=h;
    }
    function calc(){
      var vals=[],series=0,parallel=0;
      for(var i=0;i<count;i++){
        var v=+gv('spr'+i);
        if(v>0){vals.push({n:i+1,v:v});series+=v;parallel+=1/v;}
      }
      if(!vals.length)return;
      var par=1/parallel;
      g('spRes').innerHTML=
        rr('Series Total',fmtN(series,4)+' \u03a9','a')+
        rr('Parallel Total',fmtN(par,4)+' \u03a9','a')+
        rr('Resistors Used',vals.length)+
        rr('Ratio (S/P)',fmtN(series/par,3));
      var bh='';
      vals.forEach(function(r){
        bh+=rr('R'+r.n+' = '+r.v+'\u03a9',
          'Series share: '+fmtN(r.v/series*100,1)+'% | Parallel share: '+fmtN((1/r.v)/parallel*100,1)+'%');
      });
      g('spBreak').innerHTML=bh;
    }
    g('pg').addEventListener('click',function(e){
      if(e.target.id==='spAdd'&&count<10){count++;renderRows();}
      if(e.target.id==='spRem'&&count>2){count--;renderRows();}
      if(e.target.id==='spCalc')calc();
    });
    g('pg').addEventListener('input',calc);
    renderRows();calc();
  }
};

CALCS['Voltage Divider']={
  html:function(){return(
    '<h1 class="pt">Voltage Divider</h1><p class="ps">Output voltage, current, and power dissipation</p>'+
    '<div class="t2">'+
    card('CIRCUIT VALUES',
      '<div class="fr"><label>Input Voltage Vin (V)</label><input id="vdVin" type="number" value="12"></div>'+
      '<div class="fr"><label>R1 (&#937;)</label><input id="vdR1" type="number" value="1000"></div>'+
      '<div class="fr"><label>R2 (&#937;)</label><input id="vdR2" type="number" value="1000"></div>'+
      '<div class="fr"><label>Load Resistance RL (&#937;, optional)</label><input id="vdRL" type="number" placeholder="leave blank = no load"></div>'+
      '<div class="br"><button class="btn bc" id="vdCalc">Calculate</button>'+
      '<button class="btn bs" id="vdClr">Clear</button></div>')+
    card('RESULTS','<div id="vdRes"></div>')+
    '</div>'+
    '<div id="vdDiag" class="card" style="margin-top:14px;display:none">'+
    '<div class="ch">CIRCUIT DIAGRAM</div>'+
    '<div class="cb"><pre id="vdPre" style="font-size:12px;line-height:1.6;color:var(--tx);font-family:monospace"></pre></div></div>');},
  init:function(){
    function calc(){
      var Vin=+gv('vdVin'),R1=+gv('vdR1'),R2=+gv('vdR2');
      var RLstr=gv('vdRL'),RL=RLstr!==''?+RLstr:Infinity;
      if(!Vin||!R1||!R2)return;
      var R2eff=RL!==Infinity&&RL>0?R2*RL/(R2+RL):R2;
      var Vout=Vin*R2eff/(R1+R2eff);
      var I=Vin/(R1+R2eff);
      var P1=I*I*R1,P2=I*I*R2,Ptot=P1+P2;
      var PL=RL!==Infinity&&RL>0?Vout*Vout/RL:0;
      g('vdRes').innerHTML=
        rr('Output Voltage Vout',fmtN(Vout,4)+' V','a')+
        rr('Current (main)',fmtN(I*1000,4)+' mA')+
        rr('Power in R1',fmtN(P1*1000,4)+' mW')+
        rr('Power in R2',fmtN(P2*1000,4)+' mW')+
        (RL!==Infinity&&RL>0?rr('Power in Load',fmtN(PL*1000,4)+' mW'):'')+
        rr('Total Power',fmtN(Ptot*1000,4)+' mW')+
        rr('Division Ratio',fmtN(Vout/Vin*100,2)+'%');
      // ASCII diagram
      g('vdDiag').style.display='block';
      var diag=
        '  Vin = '+Vin+'V\n'+
        '   |\n'+
        '  [R1 = '+R1+'\u03a9] P='+fmtN(P1*1000,2)+'mW\n'+
        '   |_____ Vout = '+fmtN(Vout,3)+'V'+(RL!==Infinity?' \u2192 [RL='+RL+'\u03a9]':'')+'\n'+
        '  [R2 = '+R2+'\u03a9] P='+fmtN(P2*1000,2)+'mW\n'+
        '   |\n'+
        '  GND';
      g('vdPre').textContent=diag;
    }
    g('pg').addEventListener('click',function(e){
      if(e.target.id==='vdCalc')calc();
      if(e.target.id==='vdClr'){['vdVin','vdR1','vdR2','vdRL'].forEach(function(id){g(id).value='';});g('vdDiag').style.display='none';}
    });

    calc();
  }
};

CALCS['Body Surface Area']={

    card('RESULTS','<div id="bsaRes"></div>')+
    '</div>');},
  init:function(){
    function renderF(){
      var m=gv('bsaU')==='met';
      g('bsaFl').innerHTML=m?
        '<div class="fr"><label>Weight (kg)</label><input id="bsaWt" type="number" placeholder="70"></div>'+
        '<div class="fr"><label>Height (cm)</label><input id="bsaHt" type="number" placeholder="170"></div>':

      var wKg,hCm;
      if(gv('bsaU')==='met'){wKg=+gv('bsaWt');hCm=+gv('bsaHt');}

      g('bsaRes').innerHTML=
        rr('Mosteller (standard)',fmtN(most,4)+' m\u00b2','a')+
        rr('DuBois & DuBois',fmtN(du,4)+' m\u00b2')+
        rr('Haycock',fmtN(hay,4)+' m\u00b2')+
        rr('Boyd',fmtN(boyd,4)+' m\u00b2')+
        '<div style="font-size:11px;color:var(--mu);margin-top:8px;padding-top:8px;border-top:1px solid var(--bd)">'+
        'Input: '+fmtN(wKg,1)+' kg / '+fmtN(hCm,1)+' cm</div>';
    }

    g('pg').addEventListener('click',function(e){if(e.target.id==='bsaCalc')calc();});

CALCS['Binary to Hex']={
  html:function(){return(
    '<h1 class="pt">Binary / Hex / Decimal Converter</h1><p class="ps">Convert between number bases instantly</p>'+
    '<div class="t2">'+
    card('INPUT',
      '<div class="fr"><label>Decimal</label><input id="bhDec" type="number" placeholder="0 \u2013 4294967295" min="0"></div>'+
      '<div class="fr"><label>Binary</label><input id="bhBin" type="text" placeholder="e.g. 11001010" style="font-family:monospace"></div>'+
      '<div class="fr"><label>Hexadecimal</label><input id="bhHex" type="text" placeholder="e.g. CA" style="font-family:monospace"></div>'+
      '<div class="fr"><label>Octal</label><input id="bhOct" type="text" placeholder="e.g. 312" style="font-family:monospace"></div>')+
    card('BIT BREAKDOWN','<div id="bhBits"></div>')+
    '</div>');},
  init:function(){
    var busy=false;
    function pad(s,n){while(s.length<n)s='0'+s;return s;}
    function update(src,val){
      if(busy||isNaN(val)||val<0||val>4294967295)return;
      busy=true;
      var v=Math.floor(val);
      if(src!=='dec')g('bhDec').value=v;
      if(src!=='bin')g('bhBin').value=v.toString(2);
      if(src!=='hex')g('bhHex').value=v.toString(16).toUpperCase();
      if(src!=='oct')g('bhOct').value=v.toString(8);
      // bit breakdown
      var b=pad(v.toString(2),8);var rows='';
      var bytes=Math.max(1,Math.ceil(b.length/8));
      b=pad(b,bytes*8);
      rows='<div style="font-family:monospace;font-size:13px;line-height:2">';
      for(var i=0;i<bytes;i++){
        var byte=b.slice(i*8,(i+1)*8);
        rows+='Byte '+(bytes-i)+': <span style="color:var(--ac)">'+byte+'</span> = '+parseInt(byte,2)+'<br>';
      }
      rows+='</div>';
      g('bhBits').innerHTML=rows+
        rr('Decimal',v.toLocaleString())+
        rr('Hex','0x'+v.toString(16).toUpperCase())+
        rr('Binary',b)+
        rr('Bits required',v===0?1:v.toString(2).length);
      busy=false;
    }
    g('pg').addEventListener('input',function(e){
      var id=e.target.id,v=e.target.value.trim();
      if(id==='bhDec')update('dec',parseInt(v)||0);
      else if(id==='bhBin')update('bin',parseInt(v,2));
      else if(id==='bhHex')update('hex',parseInt(v,16));
      else if(id==='bhOct')update('oct',parseInt(v,8));
    });
    update('dec',202);
  }
};

CALCS['IP Converter']={
  html:function(){return(
    '<h1 class="pt">IP Address Converter</h1><p class="ps">Convert between dotted decimal, binary, and hexadecimal</p>'+
    card('IP ADDRESS',
      '<div class="fr"><label>Dotted Decimal</label><input id="ipDec" type="text" value="192.168.1.100" placeholder="e.g. 192.168.1.1"></div>'+
      '<div class="br"><button class="btn bc" id="ipCalc">Convert</button></div>')+
    '<div id="ipRes"></div>');},
  init:function(){
    function calc(){
      var ip=gv('ipDec').trim();
      var parts=ip.split('.');
      if(parts.length!==4)return;
      var octs=parts.map(Number);
      if(octs.some(function(o){return isNaN(o)||o<0||o>255;}))return;
      var num=(((octs[0]*256+octs[1])*256+octs[2])*256+octs[3])>>>0;
      function pad8(n){var s=n.toString(2);while(s.length<8)s='0'+s;return s;}
      var binParts=octs.map(pad8);
      var hexParts=octs.map(function(o){return ('0'+o.toString(16).toUpperCase()).slice(-2);});
      g('ipRes').innerHTML=
        '<div class="card"><div class="cb">'+
        rr('Dotted Decimal',ip)+
        rr('Binary',binParts.join('.'))+
        rr('Hex','0x'+hexParts.join('')+' ('+hexParts.join('.')+')')+
        rr('Decimal (32-bit)',num.toLocaleString())+
        rr('Reverse DNS',octs.slice().reverse().join('.')+'.in-addr.arpa')+
        '<div style="margin-top:12px;font-size:11px;font-weight:700;color:var(--mu)">OCTET BREAKDOWN</div>'+
        octs.map(function(o,i){return rr('Octet '+(i+1)+' = '+o,pad8(o)+' (0x'+('0'+o.toString(16).toUpperCase()).slice(-2)+')'  );}).join('')+
        '</div></div>';
    }
    g('pg').addEventListener('click',function(e){if(e.target.id==='ipCalc')calc();});
    g('pg').addEventListener('keydown',function(e){if(e.key==='Enter')calc();});
    calc();
  }
};

// ── IT: IPv6 Calculator ───────────────────────────────────────────────────────
CALCS['IPv6 Calculator']={
  html:function(){return(
    '<h1 class="pt">IPv6 Calculator</h1><p class="ps">Expand, compress, and analyze IPv6 addresses</p>'+
    card('IPv6 ADDRESS',
      '<div class="fr"><label>IPv6 Address</label><input id="v6In" type="text" value="2001:db8::1" placeholder="e.g. 2001:db8::1" style="font-family:monospace"></div>'+
      '<div class="br"><button class="btn bc" id="v6Calc">Analyze</button>'+
      '<button class="btn bs" id="v6Loopback">::1 (loopback)</button>'+
      '<button class="btn bs" id="v6Link">fe80::1 (link-local)</button></div>')+
    '<div id="v6Res"></div>');},
  init:function(){
    function expand(addr){
      // Handle :: expansion
      if(addr.indexOf('::')>=0){
        var sides=addr.split('::');
        var left=sides[0]?sides[0].split(':'):[];
        var right=sides[1]?sides[1].split(':'):[];
        var missing=8-left.length-right.length;
        var middle=[];for(var i=0;i<missing;i++)middle.push('0000');
        var all=left.concat(middle,right);
        return all.map(function(g){return ('0000'+g).slice(-4);}).join(':');
      }
      return addr.split(':').map(function(g){return ('0000'+g).slice(-4);}).join(':');
    }
    function compress(full){
      // Remove leading zeros
      var groups=full.split(':').map(function(g){return parseInt(g,16).toString(16);});
      // Find longest run of zeros
      var best={start:-1,len:0},cur={start:-1,len:0};
      groups.forEach(function(g,i){
        if(g==='0'){if(cur.start<0)cur.start=i;cur.len++;if(cur.len>best.len){best={start:cur.start,len:cur.len};}}
        else{cur={start:-1,len:0};}
      });
      if(best.len>1){
        var before=groups.slice(0,best.start).join(':');
        var after=groups.slice(best.start+best.len).join(':');
        return (before?before+'::':'::')+after;
      }
      return groups.join(':');
    }
    function getType(full){
      var g=full.split(':');
      if(full==='0000:0000:0000:0000:0000:0000:0000:0001')return 'Loopback (::1)';
      if(g[0]==='fe80')return 'Link-Local';
      if(g[0]==='fc00'||g[0]==='fd00')return 'Unique Local (ULA)';
      if(g[0]==='2001'&&g[1]==='0db8')return 'Documentation (2001:db8::/32)';
      if(g[0]==='ff00'||g[0].slice(0,2)==='ff')return 'Multicast';
      if(g[0]==='2001')return 'Global Unicast';
      return 'Unknown / Unspecified';
    }
    function calc(){
      var addr=gv('v6In').trim().toLowerCase();
      try{
        var full=expand(addr);
        var parts=full.split(':');
        if(parts.length!==8||parts.some(function(p){return p.length!==4||isNaN(parseInt(p,16));})){
          g('v6Res').innerHTML='<div style="color:#C53030">Invalid IPv6 address</div>';return;
        }
        var comp=compress(full);
        var binStr=parts.map(function(p){return ('0000000000000000'+parseInt(p,16).toString(2)).slice(-16);}).join('');
        g('v6Res').innerHTML=
          '<div class="card"><div class="cb">'+
          rr('Expanded',full,'a')+
          rr('Compressed',comp,'a')+
          rr('Address Type',getType(full))+
          rr('Total Bits','128')+
          rr('Hex (no colons)',parts.join('').toUpperCase())+
          '</div></div>';
      }catch(e){g('v6Res').innerHTML='<div style="color:#C53030">Invalid address: '+e.message+'</div>';}
    }
    g('pg').addEventListener('click',function(e){
      if(e.target.id==='v6Calc')calc();
      if(e.target.id==='v6Loopback'){g('v6In').value='::1';calc();}
      if(e.target.id==='v6Link'){g('v6In').value='fe80::1';calc();}
    });
    g('pg').addEventListener('keydown',function(e){if(e.key==='Enter')calc();});
    calc();
  }
};

CALCS['Subnet Cheat Sheet']={
  html:function(){return(
    '<h1 class="pt">Subnet Cheat Sheet</h1><p class="ps">Quick reference for all IPv4 CIDR prefixes</p>'+
    card('FILTER',
      '<div class="fr"><label>Show prefixes from /</label>'+
      '<input id="scFrom" type="number" value="16" min="0" max="32" style="width:80px">'+
      '<label style="min-width:auto;margin-left:8px">to /</label>'+
      '<input id="scTo" type="number" value="32" min="0" max="32" style="width:80px">'+
      '</div>'+
      '<div class="br"><button class="btn bc" id="scShow">Show</button>'+
      '<button class="btn bs" id="scAll">All (/0\u2013/32)</button></div>')+
    '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:14px">'+
    '<thead><tr style="background:var(--nb);color:#fff">'+
    '<th style="padding:8px 10px;text-align:left">CIDR</th>'+
    '<th style="padding:8px 10px;text-align:left">Subnet Mask</th>'+
    '<th style="padding:8px 10px;text-align:right">Usable Hosts</th>'+
    '<th style="padding:8px 10px;text-align:right">Total IPs</th>'+
    '<th style="padding:8px 10px;text-align:right">Subnets of /24</th>'+
    '</tr></thead><tbody id="scBody"></tbody></table></div>');},
  init:function(){
    function toMask(p){return [((-1<<(32-p))>>>24)&255,((-1<<(32-p))>>>16)&255,((-1<<(32-p))>>>8)&255,(-1<<(32-p))&255].join('.');}
    function render(from,to){
      var rows='';
      for(var p=from;p<=to;p++){
        var total=p===0?Math.pow(2,32):Math.pow(2,32-p);
        var hosts=p>=31?Math.max(0,total-2):total-2;
        var sub24=p<24?Math.pow(2,24-p):1/Math.pow(2,p-24);
        var bg=p%2===0?'background:var(--bg)':'';
        rows+='<tr style="'+bg+'">'+
          '<td style="padding:6px 10px;font-weight:700;color:var(--ac)">/'+p+'</td>'+
          '<td style="padding:6px 10px;font-family:monospace">'+toMask(p)+'</td>'+
          '<td style="padding:6px 10px;text-align:right">'+(p>=32?0:hosts.toLocaleString())+'</td>'+
          '<td style="padding:6px 10px;text-align:right">'+(p===0?'4.3B':total>=1e9?fmtN(total/1e9,1)+'B':total>=1e6?fmtN(total/1e6,1)+'M':total>=1000?fmtN(total/1000,1)+'K':total)+'</td>'+
          '<td style="padding:6px 10px;text-align:right">'+(sub24>=1?sub24.toLocaleString():'1/'+Math.round(1/sub24))+'</td>'+
          '</tr>';
      }
      g('scBody').innerHTML=rows;
    }
    g('pg').addEventListener('click',function(e){
      if(e.target.id==='scShow')render(+gv('scFrom'),+gv('scTo'));
      if(e.target.id==='scAll'){g('scFrom').value='0';g('scTo').value='32';render(0,32);}
    });
    render(16,32);
  }
};

// ── IT: Supernet ──────────────────────────────────────────────────────────────
CALCS['Supernet']={
  html:function(){return(
    '<h1 class="pt">Supernet Calculator</h1><p class="ps">Find the smallest supernet containing two or more networks</p>'+
    '<div class="t2">'+
    card('NETWORKS TO COMBINE',
      '<p style="font-size:12px;color:var(--mu);margin-bottom:10px">Enter networks in CIDR notation, one per line.</p>'+
      '<textarea id="snNets" rows="5" style="font-family:monospace;font-size:13px" placeholder="192.168.1.0/24\n192.168.2.0/24\n192.168.3.0/24"></textarea>'+
      '<div class="br"><button class="btn bc" id="snCalc">Calculate Supernet</button></div>')+
    card('RESULTS','<div id="snRes"><div class="rr"><span class="rl">Enter networks above</span></div></div>')+
    '</div>');},
  init:function(){
    function ipToNum(ip){
      var p=ip.split('.').map(Number);
      return(((p[0]*256+p[1])*256+p[2])*256+p[3])>>>0;
    }
    function numToIp(n){return[(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.');}
    function calc(){
      var lines=gv('snNets').trim().split('\n').map(function(l){return l.trim();}).filter(function(l){return l;});
      if(lines.length<2){g('snRes').innerHTML='<div style="color:var(--mu)">Enter at least 2 networks.</div>';return;}
      var nets=[];
      for(var i=0;i<lines.length;i++){
        var parts=lines[i].split('/');
        if(parts.length!==2){g('snRes').innerHTML='<div style="color:#C53030">Invalid: '+lines[i]+'</div>';return;}
        var prefix=parseInt(parts[1]);
        var mask=(prefix===0?0:((-1)<<(32-prefix)))>>>0;
        var net=(ipToNum(parts[0].trim())&mask)>>>0;
        nets.push({net:net,prefix:prefix,orig:lines[i]});
      }
      // Find supernet: common prefix of all network addresses
      var bits=32;
      for(var i=1;i<nets.length;i++){
        var xor=nets[0].net^nets[i].net;
        var common=0;
        for(var b=31;b>=0;b--){if(xor>>>(b)&1){common=31-b;break;}else if(b===0)common=32;}
        bits=Math.min(bits,common,nets[0].prefix,nets[i].prefix);
      }
      var superMask=(bits===0?0:((-1)<<(32-bits)))>>>0;
      var superNet=(nets[0].net&superMask)>>>0;
      var total=Math.pow(2,32-bits);
      g('snRes').innerHTML=
        rr('Supernet',numToIp(superNet)+'/'+bits,'a')+
        rr('Subnet Mask',numToIp(superMask))+
        rr('Network Address',numToIp(superNet))+
        rr('Broadcast',numToIp((superNet|(~superMask>>>0))>>>0))+
        rr('Total IPs',total.toLocaleString())+
        rr('Contains',nets.length+' networks');
    }
    g('pg').addEventListener('click',function(e){if(e.target.id==='snCalc')calc();});
  }
};

    '<div class="t2">'+

      '<div class="fr"><label>Total Span (inches)</label><input id="btSpan" type="number" value="96"></div>'+
      '<div class="fr"><label>Batten Width (inches)</label><input id="btW" type="number" value="1.5"></div>'+

    g('pg').addEventListener('click',function(e){if(e.target.id==='btCalc')calc();});
    g('pg').addEventListener('input',calc);
    calc();
  }
};

CALCS['Concrete Volume']={
  html:function(){return(
    '<h1 class="pt">Concrete Volume Calculator</h1><p class="ps">Slabs, footings, columns &mdash; cubic yards and bags</p>'+
    '<div class="t2">'+
    card('POUR DETAILS',
      '<div class="fr"><label>Shape</label>'+
      '<select id="cvSh"><option value="slab">Slab / Footing</option>'+
      '<option value="col">Round Column</option><option value="tube">Round Tube Footing</option></select></div>'+
      '<div id="cvFl"></div>'+
      '<div class="fr"><label>Bag Size</label>'+
      '<select id="cvBag"><option value="60">60 lb bag</option><option value="80">80 lb bag</option></select></div>'+
      '<div class="br"><button class="btn bc" id="cvCalc">Calculate</button></div>')+
    card('RESULTS','<div id="cvRes"></div>')+
    '</div>');},
  init:function(){
    var shapes={
      slab:[['Length (ft)','cvL'],['Width (ft)','cvW'],['Thickness (in)','cvT']],
      col:[['Diameter (in)','cvD'],['Height (ft)','cvH']],
      tube:[['Diameter (in)','cvD2'],['Depth (ft)','cvDp']]
    };
    function renderF(){
      var sh=gv('cvSh');
      g('cvFl').innerHTML=shapes[sh].map(function(f){
        return '<div class="fr"><label>'+f[0]+'</label><input id="'+f[1]+'" type="number" placeholder="0"></div>';
      }).join('');
    }
    function calc(){
      var sh=gv('cvSh'),bagSz=+gv('cvBag'),ft3;
      try{
        if(sh==='slab'){ft3=+gv('cvL')*+gv('cvW')*(+gv('cvT')/12);}
        else if(sh==='col'){var r=+gv('cvD')/2/12;ft3=Math.PI*r*r*+gv('cvH');}
        else{var r2=+gv('cvD2')/2/12;ft3=Math.PI*r2*r2*+gv('cvDp');}
      }catch(e){return;}
      if(!ft3||ft3<=0)return;
      var yd3=ft3/27,bags=Math.ceil(yd3/(bagSz===60?0.45:0.6)*27);
      g('cvRes').innerHTML=
        rr('Cubic Feet',fmtN(ft3,2)+' ft\u00b3')+
        rr('Cubic Yards',fmtN(yd3,3)+' yd\u00b3','a')+
        rr('Bags Needed ('+bagSz+'lb)',bags+' bags')+
        rr('Add 10% Waste',Math.ceil(bags*1.1)+' bags recommended');
    }
    g('pg').addEventListener('click',function(e){if(e.target.id==='cvCalc')calc();});
    g('pg').addEventListener('change',function(e){if(e.target.id==='cvSh')renderF();});
    g('pg').addEventListener('input',calc);
    renderF();
  }
};

// ── Construction: Crown Molding ───────────────────────────────────────────────
CALCS['Crown Molding']={
  html:function(){return(
    '<h1 class="pt">Crown Molding Calculator</h1><p class="ps">Miter and bevel angles for perfect crown joints</p>'+
    '<div class="t2">'+
    card('MOLDING DETAILS',
      '<div class="fr"><label>Corner Angle (degrees)</label><input id="cmCorner" type="number" value="90" step="0.5"></div>'+
      '<div class="fr"><label>Spring Angle</label>'+
      '<select id="cmSpring"><option value="38">38\u00b0 (common)</option>'+
      '<option value="45">45\u00b0 (equal spring)</option>'+
      '<option value="52">52\u00b0</option></select></div>'+
      '<div class="br"><button class="btn bc" id="cmCalc">Calculate</button></div>')+
    card('CUT ANGLES','<div id="cmRes"></div>')+
    '</div>'+
    card('NOTES',
      '<div style="font-size:12px;color:var(--mu);line-height:1.8">'+
      '<b>Inside corner:</b> hold molding flat on saw table, set miter &amp; bevel as shown.<br>'+
      '<b>Outside corner:</b> reverse the miter direction for each piece.<br>'+
      '<b>Spring angle</b> = angle the molding makes with the wall.</div>'));},
  init:function(){
    function calc(){
      var corner=+gv('cmCorner'),spring=+gv('cmSpring');
      if(!corner||!spring)return;
      var halfCorner=(180-corner)/2*Math.PI/180;
      var sp=spring*Math.PI/180;
      var miter=Math.atan(Math.cos(sp)*Math.tan(halfCorner))*180/Math.PI;
      var bevel=Math.asin(Math.sin(halfCorner)*Math.sin(sp))*180/Math.PI;
      g('cmRes').innerHTML=
        rr('Miter Angle',fmtN(miter,2)+'\u00b0','a')+
        rr('Bevel Angle',fmtN(bevel,2)+'\u00b0','a')+
        rr('Spring Angle',spring+'\u00b0')+
        rr('Corner Angle',corner+'\u00b0')+
        rr('Flat Ceiling Angle',fmtN(90-spring,2)+'\u00b0');
    }
    g('pg').addEventListener('click',function(e){if(e.target.id==='cmCalc')calc();});
    g('pg').addEventListener('input',calc);g('pg').addEventListener('change',calc);
    calc();
  }
};

CALCS['Decking']={
  html:function(){return(
    '<h1 class="pt">Decking Calculator</h1><p class="ps">Boards, linear feet, and cost estimate</p>'+
    '<div class="t2">'+
    card('DECK DETAILS',
      '<div class="fr"><label>Deck Length (ft)</label><input id="dkL" type="number" value="16"></div>'+
      '<div class="fr"><label>Deck Width (ft)</label><input id="dkW" type="number" value="12"></div>'+
      '<div class="fr"><label>Board Width (actual, in)</label><input id="dkBW" type="number" value="5.5"></div>'+
      '<div class="fr"><label>Gap Between Boards (in)</label><input id="dkGap" type="number" value="0.25" step="0.05"></div>'+
      '<div class="fr"><label>Board Length (ft)</label><input id="dkBL" type="number" value="16"></div>'+
      '<div class="fr"><label>Waste Factor (%)</label><input id="dkWaste" type="number" value="10"></div>'+
      '<div class="fr"><label>Cost per Linear Ft ($)</label><input id="dkCost" type="number" value="0" step="0.01"></div>'+
      '<div class="br"><button class="btn bc" id="dkCalc">Calculate</button></div>')+
    card('RESULTS','<div id="dkRes"></div>')+
    '</div>'+
    '<canvas id="dkCv" style="width:100%;height:220px;border-radius:8px;background:#f0f4f8;display:block;margin-top:14px"></canvas>');},
  init:function(){
    function calc(){
      var L=+gv('dkL'),W=+gv('dkW'),bw=+gv('dkBW'),gap=+gv('dkGap'),bl=+gv('dkBL'),waste=+gv('dkWaste'),cost=+gv('dkCost');
      if(!L||!W||!bw||!bl)return;
      var deckArea=L*W;
      var boardsNeeded=Math.ceil(W*12/(bw+gap));
      var linearFt=boardsNeeded*bl;
      var withWaste=Math.ceil(linearFt*(1+waste/100));
      var boardCount=Math.ceil(withWaste/bl);
      var coverageW=boardsNeeded*(bw/12);
      g('dkRes').innerHTML=
        rr('Deck Area',fmtN(deckArea,1)+' sq ft')+
        rr('Boards Needed',boardsNeeded+' boards ('+bl+"' lengths)",'a')+
        rr('Linear Feet',fmtN(linearFt,1)+' lf')+
        rr('With '+waste+'% Waste',boardCount+' boards ('+fmtN(withWaste,1)+' lf)','a')+
        rr('Actual Coverage',fmtN(coverageW,2)+"' wide")+
        (cost>0?rr('Estimated Cost',fmtM(withWaste*cost)):''  );
    }
    function drawDecking(){
      var cv=document.getElementById('dkCv');if(!cv)return;
      var W=cv.clientWidth||500;cv.width=W;cv.height=220;
      var ctx=cv.getContext('2d');ctx.clearRect(0,0,W,220);
      var DL=+gv('dkL')||16,DW=+gv('dkW')||12;
      var bw=+gv('dkBW')||5.5,gap=+gv('dkGap')||0.25,bl=+gv('dkBL')||16;
      var PAD=30,dW=W-PAD*2,dH=160;
      var scX=dW/(DW*12),scY=dH/(DL);
      var ox=PAD,oy=30;
      ctx.strokeStyle='#1F3864';ctx.lineWidth=2;ctx.strokeRect(ox,oy,dW,dH);
      var bwPx=bw*scX,gapPx=gap*scX;
      var clrs=['#D4A96A','#C49A5E','#BA8B52'];
      var x=ox,bnum=0;
      while(x<ox+dW&&bnum<120){
        var bp=Math.min(bwPx,ox+dW-x);
        ctx.fillStyle=clrs[bnum%3];ctx.fillRect(x,oy,bp,dH);
        ctx.strokeStyle='rgba(0,0,0,0.07)';ctx.lineWidth=0.5;
        for(var gy=oy+12;gy<oy+dH-4;gy+=18){
          ctx.beginPath();ctx.moveTo(x+1,gy);ctx.lineTo(x+bp-1,gy+2);ctx.stroke();
        }
        x+=bwPx+gapPx;bnum++;
      }
      ctx.strokeStyle='rgba(31,56,100,0.35)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
      var blPx=bl/DL*dH;
      for(var y=oy+blPx;y<oy+dH-2;y+=blPx){
        ctx.beginPath();ctx.moveTo(ox,y);ctx.lineTo(ox+dW,y);ctx.stroke();
      }
      ctx.setLineDash([]);
      ctx.strokeStyle='#1F3864';ctx.lineWidth=2;ctx.strokeRect(ox,oy,dW,dH);
      ctx.font='bold 11px Segoe UI,sans-serif';
      ctx.fillStyle='#1F3864';ctx.textAlign='center';
      ctx.fillText(DW+"' wide",ox+dW/2,oy+dH+17);
      ctx.save();ctx.translate(ox-12,oy+dH/2);ctx.rotate(-Math.PI/2);
      ctx.fillText(DL+"' long",0,0);ctx.restore();
    }
    g('pg').addEventListener('click',function(e){if(e.target.id==='dkCalc')calc();});
    g('pg').addEventListener('input',function(){calc();drawDecking();});
    calc();drawDecking();
    window.addEventListener('resize',drawDecking);
  }
};

// ── Construction: Diagonal ────────────────────────────────────────────────────
CALCS['Diagonal']={
  html:function(){return(
    '<h1 class="pt">Diagonal Calculator</h1><p class="ps">Diagonal length, angle, and 3-4-5 squaring check</p>'+
    '<div class="t2">'+
    card('DIMENSIONS',
      '<div class="fr"><label>Length (ft)</label><input id="dgL" type="number" value="12"></div>'+
      '<div class="fr"><label>Width (ft)</label><input id="dgW" type="number" value="9"></div>'+
      '<div class="br"><button class="btn bc" id="dgCalc">Calculate</button></div>')+
    card('RESULTS','<div id="dgRes"></div>')+
    '</div>'+
    '<canvas id="dgCv" style="width:100%;height:220px;border-radius:8px;background:#f0f4f8;display:block;margin-top:14px"></canvas>');},
  init:function(){
    function calc(){
      var L=+gv('dgL'),W=+gv('dgW');if(!L||!W)return;
      var d=Math.sqrt(L*L+W*W);
      var angL=Math.atan(W/L)*180/Math.PI;
      var angW=Math.atan(L/W)*180/Math.PI;
      // 3-4-5 check: both diagonals equal?
      var gcd=function(a,b){return b?gcd(b,a%b):a;};
      var g2=gcd(Math.round(L*1000),Math.round(W*1000));
      var lRatio=Math.round(L*1000)/g2,wRatio=Math.round(W*1000)/g2;
      g('dgRes').innerHTML=
        rr('Diagonal',fmtN(d,4)+' ft ('+fmtN(d*12,3)+' in)','a')+
        rr('Diagonal (in)',fmtN(d*12,3)+'"')+
        rr('Angle at Length',fmtN(angL,2)+'\u00b0')+
        rr('Angle at Width',fmtN(angW,2)+'\u00b0')+
        rr('Ratio',fmtN(lRatio/1000,3)+' : '+fmtN(wRatio/1000,3))+
        rr('Area',fmtN(L*W,2)+' sq ft');
    }
    function drawDiag(){
      var cv=document.getElementById('dgCv');if(!cv)return;
      var W=cv.clientWidth||500;cv.width=W;cv.height=220;
      var ctx=cv.getContext('2d');ctx.clearRect(0,0,W,220);
      var L=+gv('dgL')||12,Wd=+gv('dgW')||9;
      var PAD=50,sc=Math.min((W-PAD*2)/L,160/Wd);
      var rw=L*sc,rh=Wd*sc;
      var ox=(W-rw)/2,oy=(220-rh)/2;
      ctx.fillStyle='#EBF3FB';ctx.fillRect(ox,oy,rw,rh);
      ctx.strokeStyle='#1F3864';ctx.lineWidth=2;ctx.strokeRect(ox,oy,rw,rh);
      ctx.strokeStyle='#1565C0';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+rw,oy+rh);ctx.stroke();
      ctx.strokeStyle='#276749';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
      ctx.beginPath();ctx.moveTo(ox+rw,oy);ctx.lineTo(ox,oy+rh);ctx.stroke();
      ctx.setLineDash([]);
      ctx.font='bold 12px Segoe UI,sans-serif';
      ctx.fillStyle='#1F3864';ctx.textAlign='center';
      ctx.fillText('Length: '+L+"'",ox+rw/2,oy+rh+18);
      ctx.save();ctx.translate(ox-14,oy+rh/2);ctx.rotate(-Math.PI/2);
      ctx.fillText('Width: '+Wd+"'",0,0);ctx.restore();
      ctx.fillStyle='#1565C0';
      var d=Math.sqrt(L*L+Wd*Wd);
      ctx.save();ctx.translate(ox+rw/2+4,oy+rh/2);
      ctx.rotate(Math.atan(rh/rw));
      ctx.fillText(d.toFixed(3)+"'",0,-8);
      ctx.restore();
    }
    g('pg').addEventListener('click',function(e){if(e.target.id==='dgCalc')calc();});
    g('pg').addEventListener('input',function(){calc();drawDiag();});
    calc();drawDiag();
    window.addEventListener('resize',drawDiag);
  }
};

// ── Construction: Frame Spacing ───────────────────────────────────────────────
CALCS['Frame Spacing']={
  html:function(){return(
    '<h1 class="pt">Frame Spacing Calculator</h1><p class="ps">Stud, joist, or rafter spacing and count</p>'+
    '<div class="t2">'+
    card('FRAME DETAILS',
      '<div class="fr"><label>Wall / Span Length (ft)</label><input id="fsL" type="number" value="16"></div>'+
      '<div class="fr"><label>Member Width (in, e.g. 1.5 for 2x)</label><input id="fsMW" type="number" value="1.5" step="0.25"></div>'+
      '<div class="fr"><label>Spacing On-Center (in)</label>'+
      '<select id="fsOC"><option value="12">12" OC</option><option value="16" selected>16" OC</option>'+
      '<option value="19.2">19.2" OC</option><option value="24">24" OC</option></select></div>'+
      '<div class="br"><button class="btn bc" id="fsCalc">Calculate</button></div>')+
    card('RESULTS','<div id="fsRes"></div>')+
    '</div>'+
    '<div class="card" style="margin-top:14px"><div class="ch">LAYOUT POSITIONS (first 10)</div>'+
    '<div class="cb"><div id="fsList"></div></div></div>'+
    '<canvas id="fsCv" style="width:100%;height:220px;border-radius:8px;background:#f0f4f8;display:block;margin-top:14px"></canvas>');},
  init:function(){
    function calc(){
      var L=+gv('fsL')*12,mw=+gv('fsMW'),oc=+gv('fsOC');
      if(!L||!oc)return;
      var count=Math.floor((L-mw)/oc)+1;
      var lastPos=(count-1)*oc;
      var positions=[];
      for(var i=0;i<count;i++)positions.push(i*oc);
      g('fsRes').innerHTML=
        rr('Number of Members',count,'a')+
        rr('Spacing (OC)',oc+'"')+
        rr('First Member','0" from start')+
        rr('Last Member',fmtN(lastPos,1)+'" from start')+
        rr('Remaining Space',fmtN(L-lastPos-mw,1)+'" (end piece)');
      var list='';
      positions.slice(0,10).forEach(function(p,i){
        list+=rr('Member '+(i+1),fmtN(p,1)+'" ('+Math.floor(p/12)+"' "+fmtN(p%12,2)+'")');
      });
      if(count>10)list+='<div style="font-size:11px;color:var(--mu);padding:6px 0">...and '+(count-10)+' more</div>';
      g('fsList').innerHTML=list;
    }
    function drawFrame(){
      var cv=document.getElementById('fsCv');if(!cv)return;
      var W=cv.clientWidth||500;cv.width=W;cv.height=220;
      var ctx=cv.getContext('2d');ctx.clearRect(0,0,W,220);
      var spanIn=+gv('fsL')*12||192,mw=+gv('fsMW')||1.5,oc=+gv('fsOC')||16;
      var count=Math.floor((spanIn-mw)/oc)+1;
      if(count<=0||count>80)return;
      var PAD=20,wallW=W-PAD*2,wallH=160,oy=30;
      ctx.fillStyle='#EEF2F7';ctx.fillRect(PAD,oy,wallW,wallH);
      ctx.strokeStyle='#1F3864';ctx.lineWidth=2;ctx.strokeRect(PAD,oy,wallW,wallH);
      var scale=wallW/spanIn;
      var showCount=Math.min(count,40);
      for(var i=0;i<showCount;i++){
        var x=PAD+i*oc*scale;
        var sw=Math.max(2,mw*scale);
        ctx.fillStyle=(i===0||i===count-1)?'#1F3864':'#1565C0';
        ctx.fillRect(x,oy,sw,wallH);
      }
      if(count>=2){
        var x0=PAD,x1=PAD+oc*scale;
        ctx.strokeStyle='#276749';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(x0,oy+wallH+10);ctx.lineTo(x1,oy+wallH+10);ctx.stroke();
        ctx.beginPath();ctx.moveTo(x0,oy+wallH+6);ctx.lineTo(x0,oy+wallH+14);ctx.stroke();
        ctx.beginPath();ctx.moveTo(x1,oy+wallH+6);ctx.lineTo(x1,oy+wallH+14);ctx.stroke();
        ctx.fillStyle='#276749';ctx.font='11px Segoe UI,sans-serif';ctx.textAlign='center';
        ctx.fillText(oc+'" OC',(x0+x1)/2,oy+wallH+26);
      }
      ctx.font='bold 11px Segoe UI,sans-serif';
      ctx.fillStyle='#1F3864';ctx.textAlign='center';
      ctx.fillText(count+' members @ '+oc+'" OC  ('+gv('fsL')+"')",W/2,oy-10);
    }
    g('pg').addEventListener('click',function(e){if(e.target.id==='fsCalc')calc();});
    g('pg').addEventListener('input',function(){calc();drawFrame();});
    g('pg').addEventListener('change',function(){calc();drawFrame();});
    calc();drawFrame();
    window.addEventListener('resize',drawFrame);
  }
};
