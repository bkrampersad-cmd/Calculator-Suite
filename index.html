<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1F3864">
<title>Beeran's Calculator Suite</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--nb:#1F3864;--na:#2F5496;--nh:#16294E;--ac:#1565C0;--bg:#EEF2F7;--cd:#fff;
  --ib:#EBF3FB;--rb:#D6E4F0;--tx:#1A202C;--mu:#718096;--bd:#CBD5E0;--ok:#276749;
  --f:'Segoe UI',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--f);background:var(--bg);color:var(--tx);display:flex;height:100vh;overflow:hidden}
#sb{width:220px;min-width:220px;background:var(--nb);display:flex;flex-direction:column;
  height:100vh;overflow:hidden;transition:transform .25s;z-index:100}
.logo{padding:20px 16px 14px;text-align:center;border-bottom:1px solid #2F5496}
.lt{font-size:15px;font-weight:700;color:#fff;line-height:1.5}
.ls{font-size:11px;color:#90C8F0;margin-top:3px}
.ns{flex:1;overflow-y:auto;padding:6px 0}
.ns::-webkit-scrollbar{width:4px}
.ns::-webkit-scrollbar-thumb{background:#2F5496;border-radius:2px}
.nb{display:flex;align-items:center;gap:10px;width:calc(100% - 16px);margin:2px 8px;
  padding:9px 12px;background:transparent;border:none;color:#fff;font:600 13px var(--f);
  cursor:pointer;text-align:left;border-radius:6px;transition:background .15s}
.nb:hover{background:var(--nh)}
.nb.on{background:var(--na)}
.ni{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.bb{display:flex;align-items:center;gap:8px;width:calc(100% - 16px);margin:6px 8px;
  padding:8px 12px;background:#16294E;border:none;color:#90C8F0;
  font:600 12px var(--f);cursor:pointer;border-radius:6px}
.st{font-size:10px;color:#90C8F0;padding:10px 18px 4px;text-transform:uppercase;letter-spacing:.8px}
.sbot{padding:8px;border-top:1px solid #2F5496}
.spg{display:flex;align-items:center;gap:8px;width:100%;padding:9px 12px;
  background:var(--na);border:none;color:#fff;font:600 12px var(--f);
  cursor:pointer;border-radius:8px;margin-top:4px}
.spg:hover{background:var(--nh)}
.spg.alt{background:#16294E}
#ct{flex:1;overflow-y:auto}
#ct::-webkit-scrollbar{width:6px}
#ct::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.pg{padding:26px 28px;max-width:1100px}
.pt{font-size:22px;font-weight:700;color:var(--nb);margin-bottom:4px}
.ps{font-size:11px;color:var(--mu);margin-bottom:20px}
#hm{display:none;position:fixed;top:12px;left:12px;z-index:200;background:var(--nb);
  border:none;border-radius:8px;color:#fff;font-size:20px;width:40px;height:40px;cursor:pointer}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
.card{background:var(--cd);border-radius:10px;border:1px solid var(--bd);overflow:hidden;margin-bottom:14px}
.ch{background:var(--nb);color:#fff;font:700 11px var(--f);padding:8px 14px;
  text-transform:uppercase;letter-spacing:.5px}
.cb{padding:16px}
.t2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.fr label{font-size:12px;color:var(--tx);min-width:170px;flex-shrink:0}
input,select{font:13px var(--f);background:var(--ib);border:1px solid #B8CCE4;
  border-radius:6px;padding:7px 10px;color:var(--tx);width:100%;outline:none}
input:focus,select:focus{border-color:var(--ac);box-shadow:0 0 0 2px rgba(21,101,192,.15)}
.br{display:flex;gap:8px;margin-top:14px}
.btn{padding:8px 18px;border:none;border-radius:8px;font:700 12px var(--f);cursor:pointer;transition:filter .15s}
.btn:hover{filter:brightness(1.1)}
.bc{background:var(--ac);color:#fff}
.bs{background:var(--bd);color:var(--tx);padding:6px 12px}
.rr{display:flex;justify-content:space-between;align-items:center;
  padding:7px 0;border-bottom:1px solid #F0F4F8}
.rr:last-child{border-bottom:none}
.rl{font-size:11px;color:var(--mu)}
.rv{font-size:13px;font-weight:700;color:var(--tx)}
.rv.a{color:var(--ac)}.rv.s{color:var(--ok)}
.rb{background:var(--rb);border-radius:8px;padding:14px 16px;margin-top:10px}
.cd{background:#0D1B2A;color:#fff;font:400 28px 'Courier New',monospace;padding:14px 16px;
  border-radius:8px;text-align:right;min-height:60px;word-break:break-all;margin-bottom:10px}
.cd .ex{font-size:12px;color:#90C8F0;min-height:16px}
.cg{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.ck{padding:14px 8px;border:none;border-radius:8px;font:600 15px var(--f);cursor:pointer;transition:filter .15s}
.ck:hover{filter:brightness(.9)}
.kn{background:#EBF3FB;color:var(--tx)}.ko{background:#2F5496;color:#fff}
.ke{background:var(--ac);color:#fff}.kf{background:#CBD5E0;color:var(--tx)}.k2{grid-column:span 2}
.tg{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:8px}
.tt{background:var(--ib);border:1px solid var(--bd);border-radius:10px;text-align:center;padding:10px 4px}
.tp{font:700 15px var(--f);color:var(--ac)}.ta{font-size:12px;color:var(--tx);margin-top:3px}
.ss{background:var(--nb);border-radius:10px;display:grid;grid-template-columns:repeat(3,1fr);margin-bottom:18px}
.sc{text-align:center;padding:18px 8px}
.sn{font-size:34px;font-weight:700;color:#90C8F0}.sl{font-size:12px;color:#fff;margin-top:2px}
.cs{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 20px;text-align:center;color:var(--mu);min-height:300px}
.cs .ci{font-size:48px;margin-bottom:16px;opacity:.5}
.cs h3{font-size:18px;color:var(--nb);margin-bottom:8px}
.cs p{font-size:13px;max-width:340px;line-height:1.6}
.ac{background:var(--cd);border-radius:12px;border:1px solid var(--bd);padding:24px;margin-bottom:14px}
.qt{background:var(--rb);border-radius:8px;padding:14px 18px;font-style:italic;
  font-size:13px;color:var(--nb);margin:14px 0;line-height:1.6}
textarea{width:100%;font:13px var(--f);padding:10px;background:var(--ib);
  border:1px solid #B8CCE4;border-radius:8px;resize:vertical;min-height:100px;
  color:var(--tx);outline:none}
textarea:focus{border-color:var(--ac)}
@media(max-width:700px){
  #hm{display:flex;align-items:center;justify-content:center}
  #sb{position:fixed;left:0;top:0;transform:translateX(-100%)}
  #sb.open{transform:translateX(0)}
  .ov.open{display:block}
  #ct{padding-top:52px}
  .pg{padding:14px}.t2{grid-template-columns:1fr}.tg{grid-template-columns:repeat(3,1fr)}
  .ss{grid-template-columns:1fr}.fr{flex-direction:column;align-items:flex-start}
  .fr label{min-width:unset}
}
</style>
</head>
<body>
<button id="hm" onclick="toggleSB()">&#9776;</button>
<div class="ov" id="ov" onclick="toggleSB()"></div>
<nav id="sb">
  <div class="logo">
    <div class="lt">&#129518; Beeran's</div>
    <div class="lt">Calculator Suite</div>
    <div class="ls">48 calculators &middot; 8 categories</div>
  </div>
  <div class="ns" id="mn"><div id="ni"></div></div>
  <div class="ns" id="sn" style="display:none">
    <button class="bb" id="bbk">&#8592; Back</button>
    <div class="st" id="snt"></div>
    <div id="si"></div>
  </div>
  <div class="sbot">
    <button class="spg" id="btn-settings">&#9881;&#65039; Settings</button>
    <button class="spg alt" id="btn-about">&#8505;&#65039; About</button>
  </div>
</nav>
<main id="ct"><div id="pg" class="pg"></div></main>
<script>function g(id){return document.getElementById(id);}
function gv(id){var e=g(id);return e?e.value:'';}
function fmtMoney(v){return '$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtNum(v,d){if(d===undefined){d=2;}return Number(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});}
function rr(lbl,val,cls){return '<div class="rr"><span class="rl">'+lbl+'</span><span class="rv'+(cls?' '+cls:'')+'">'+val+'</span></div>';}
function mkcard(h,b){return '<div class="card"><div class="ch">'+h+'</div><div class="cb">'+b+'</div></div>';}

var CATS=[
  {id:'basic',      icon:'&#128290;',name:'Basic Calculator',     calcs:['Basic Calculator']},
  {id:'scientific', icon:'&#128300;',name:'Scientific & Graphing',calcs:['Scientific Calculator']},
  {id:'construction',icon:'&#127959;',name:'Construction',
    calcs:['Area','Batten Spacing','Concrete Volume','Corner Angle','Crown Molding',
           'Decking','Diagonal','Frame Spacing','Lumber','Miter Joint',
           'Overlapping Boards','Parquet Floor','Ramp','Roofing','Slope','Stairs','Volume']},
  {id:'conversion', icon:'&#128260;',name:'Conversion',           calcs:['Currency Converter','Time & Date','Unit Converter']},
  {id:'electronics',icon:'&#9889;',  name:'Electronics',          calcs:["Ohm's Law",'Series & Parallel','Voltage Divider']},
  {id:'finance',    icon:'&#128201;',name:'Finance',
    calcs:['Amortization','Bill Splitter','Compound Interest','Credit Card Payoff',
           'Depreciation','Loan','MACRS Full','MACRS Rate','Mortgage','ROI','Savings Goal']},
  {id:'networking', icon:'&#127760;',name:'IT Networking',
    calcs:['Binary to Hex','IP Converter','IPv6 Calculator','Subnet CIDR',
           'Subnet Cheat Sheet','Supernet']},
  {id:'medical',    icon:'&#127973;',name:'Medical',
    calcs:['BMI Calculator','Body Surface Area','Drug Dosage',
           'IV Drip Rate','Opioid Conversion','Pharmacy Dilution']}
];

// Active sub-nav state — stored globally so onclick="pick()" can reference it
var SNC='';   // current sub-nav category id
var SNL=[];   // current sub-nav calc list

function buildNav(){
  var html='';
  for(var i=0;i<CATS.length;i++){
    var c=CATS[i];
    var fn=c.calcs.length===1?'pickMain('+i+')':'openCat('+i+')';
    html+='<button class="nb" id="mnb'+i+'" onclick="'+fn+'"><span class="ni">'+c.icon+'</span>'+c.name+'</button>';
  }
  g('ni').innerHTML=html;
}

// Called when a single-calc main nav item is clicked
function pickMain(catIdx){
  var c=CATS[catIdx];
  SNC=c.id; SNL=c.calcs;
  highlight('mnb'+catIdx);
  render(c.calcs[0]);
  closeMB();
}

// Called when a multi-calc main nav item is clicked — opens sub-nav
function openCat(catIdx){
  var c=CATS[catIdx];
  SNC=c.id; SNL=c.calcs;
  g('mn').style.display='none';
  g('sn').style.display='flex';
  g('sn').style.flexDirection='column';
  g('snt').textContent=c.name;
  var html='';
  for(var i=0;i<c.calcs.length;i++){
    // Pass numeric index — no string escaping needed
    html+='<button class="nb" id="snb'+i+'" onclick="pickSub('+i+')">'+c.calcs[i]+'</button>';
  }
  g('si').innerHTML=html;
  pickSub(0);
  closeMB();
}

// Called by sub-nav button onclick
function pickSub(idx){
  if(idx<0||idx>=SNL.length)return;
  highlight('snb'+idx);
  render(SNL[idx]);
}

function highlight(activeId){
  var btns=document.querySelectorAll('.nb');
  for(var i=0;i<btns.length;i++)btns[i].classList.remove('on');
  var el=g(activeId);
  if(el)el.classList.add('on');
}

function render(name){
  if(CALCS[name]){
    g('pg').innerHTML=CALCS[name].html();
    if(CALCS[name].init)CALCS[name].init();
  }else{
    g('pg').innerHTML='<div class="cs"><div class="ci">&#128295;</div><h3>'+name+'</h3>'+
      '<p>Coming in the next release. The desktop app has all 48 calculators.</p></div>';
  }
}

g('bbk').addEventListener('click',function(){
  g('mn').style.display='block';
  g('sn').style.display='none';
  SNC=''; SNL=[];
});
g('btn-settings').addEventListener('click',function(){
  highlight('');showPage(settingsHTML());initSettings();closeMB();
});
g('btn-about').addEventListener('click',function(){
  highlight('');showPage(aboutHTML());closeMB();
});

function showPage(html){g('pg').innerHTML=html;}

var CALCS={};

CALCS['Basic Calculator']={
  html:function(){
    return '<h1 class="pt">&#128290; Basic Calculator</h1><p class="ps">Full keyboard support</p>'+
      '<div style="max-width:320px">'+
      '<div class="cd"><div class="ex" id="be">&nbsp;</div><div id="bd">0</div></div>'+
      '<div class="cg">'+
      '<button class="ck kf" data-k="AC">AC</button>'+
      '<button class="ck kf" data-k="+/-">+/&minus;</button>'+
      '<button class="ck kf" data-k="%">%</button>'+
      '<button class="ck ko" data-k="/">&divide;</button>'+
      '<button class="ck kn" data-k="7">7</button>'+
      '<button class="ck kn" data-k="8">8</button>'+
      '<button class="ck kn" data-k="9">9</button>'+
      '<button class="ck ko" data-k="*">&times;</button>'+
      '<button class="ck kn" data-k="4">4</button>'+
      '<button class="ck kn" data-k="5">5</button>'+
      '<button class="ck kn" data-k="6">6</button>'+
      '<button class="ck ko" data-k="-">&minus;</button>'+
      '<button class="ck kn" data-k="1">1</button>'+
      '<button class="ck kn" data-k="2">2</button>'+
      '<button class="ck kn" data-k="3">3</button>'+
      '<button class="ck ko" data-k="+">+</button>'+
      '<button class="ck kn k2" data-k="0">0</button>'+
      '<button class="ck kn" data-k=".">.</button>'+
      '<button class="ck ke" data-k="=">=</button>'+
      '</div></div>';
  },
  init:function(){
    var cur='0',expr='',op='',prev='',fresh=false;
    function dsp(){g('bd').textContent=cur;g('be').textContent=expr||'\u00a0';}
    function bc(k){
      if((k>='0'&&k<='9')||k==='.'){
        if(k==='.'&&cur.indexOf('.')>=0)return;
        cur=((fresh||cur==='0')&&k!=='.')?k:(cur+k);fresh=false;
      }else if(k==='+'||k==='-'||k==='*'||k==='/'){
        if(op&&!fresh){try{cur=String(new Function('return '+prev+op+cur)());}catch(e){}}
        prev=cur;op=k;expr=cur+' '+(k==='*'?'x':k==='/'?'/':k)+' ';fresh=true;
      }else if(k==='='){
        if(!op)return;
        try{expr=cur+' =';cur=String(new Function('return '+prev+op+cur)());op='';prev='';fresh=true;}
        catch(e){cur='Error';}
      }else if(k==='AC'){cur='0';expr='';op='';prev='';fresh=false;}
      else if(k==='+/-'){cur=cur.charAt(0)==='-'?cur.slice(1):'-'+cur;}
      else if(k==='%'){try{cur=String(parseFloat(cur)/100);}catch(e){}}
      dsp();
    }
    g('pg').addEventListener('click',function(e){
      var btn=e.target.closest('[data-k]');
      if(btn)bc(btn.getAttribute('data-k'));
    });
    document.onkeydown=function(e){
      var m={'Enter':'=','Backspace':'AC','Escape':'AC'};
      var k=m[e.key]||e.key;
      if('0123456789.+-*/='.indexOf(k)>=0||k==='AC')bc(k);
    };
    dsp();
  }
};

CALCS['Area']={
  html:function(){
    return '<h1 class="pt">&#128208; Area Calculator</h1><p class="ps">Rectangle, circle, triangle and more</p>'+
      '<div class="t2">'+
      mkcard('SHAPE',
        '<div class="fr"><label>Shape</label>'+
        '<select id="ash"><option>Rectangle</option><option>Square</option>'+
        '<option>Circle</option><option>Triangle</option><option>Trapezoid</option></select></div>'+
        '<div id="afl"></div>'+
        '<div class="br"><button class="btn bc" id="acalc">Calculate &rarr;</button>'+
        '<button class="btn bs" id="acl">Clear</button></div>')+
      mkcard('RESULTS','<div id="ares"><div class="rr"><span class="rl">Fill in dimensions</span><span class="rv">&mdash;</span></div></div>')+
      '</div>';
  },
  init:function(){
    var shapes={
      Rectangle:[['Length (ft)','al'],['Width (ft)','aw']],
      Square:[['Side (ft)','as']],
      Circle:[['Radius (ft)','ar']],
      Triangle:[['Base (ft)','ab'],['Height (ft)','ah']],
      Trapezoid:[['Base 1 (ft)','ab1'],['Base 2 (ft)','ab2'],['Height (ft)','aht']]
    };
    function render(){
      var s=gv('ash'),html='';
      var flds=shapes[s];
      for(var i=0;i<flds.length;i++){
        html+='<div class="fr"><label>'+flds[i][0]+'</label>'+
          '<input id="'+flds[i][1]+'" type="number" placeholder="0"></div>';
      }
      g('afl').innerHTML=html;
    }
    function calc(){
      var s=gv('ash'),a=NaN,p=NaN;
      try{
        if(s==='Rectangle'){var l=+gv('al'),w=+gv('aw');a=l*w;p=2*(l+w);}
        else if(s==='Square'){var x=+gv('as');a=x*x;p=4*x;}
        else if(s==='Circle'){var r=+gv('ar');a=Math.PI*r*r;p=2*Math.PI*r;}
        else if(s==='Triangle'){a=0.5*(+gv('ab'))*(+gv('ah'));}
        else if(s==='Trapezoid'){a=0.5*((+gv('ab1'))+(+gv('ab2')))*(+gv('aht'));}
      }catch(ex){}
      g('ares').innerHTML=
        rr('Area (sq ft)',isNaN(a)?'&mdash;':fmtNum(a)+' ft&#178;','a')+
        (isNaN(p)?'':rr('Perimeter',fmtNum(p)+' ft'))+
        (isNaN(a)?'':rr('Area (sq m)',fmtNum(a*0.0929)+' m&#178;'));
    }
    g('ash').addEventListener('change',render);
    g('pg').addEventListener('click',function(e){
      if(e.target.id==='acalc')calc();
      if(e.target.id==='acl'){var ins=g('afl').querySelectorAll('input');for(var i=0;i<ins.length;i++)ins[i].value='';}
    });
    g('pg').addEventListener('input',function(e){if(e.target.id!=='ash')calc();});
    render();
  }
};

CALCS['Currency Converter']={
  html:function(){
    var curs=['AED','AUD','BRL','CAD','CHF','CNY','COP','DKK','EGP',
      'EUR','GBP','HKD','IDR','INR','JPY','KRW','MXN','NOK','NZD','PHP',
      'PKR','QAR','SAR','SEK','SGD','THB','TRY','TTD','USD','ZAR'];
    var o1='',o2='';
    for(var i=0;i<curs.length;i++){
      o1+='<option'+(curs[i]==='USD'?' selected':'')+'>'+curs[i]+'</option>';
      o2+='<option'+(curs[i]==='EUR'?' selected':'')+'>'+curs[i]+'</option>';
    }
    return '<h1 class="pt">&#128178; Currency Converter</h1><p class="ps">Enter rate manually or fetch live</p>'+
      '<div class="t2">'+
      mkcard('INPUTS',
        '<div class="fr"><label>Amount</label><input id="camt" type="number" value="1000"></div>'+
        '<div class="fr"><label>From</label><select id="cfr">'+o1+'</select></div>'+
        '<div class="fr"><label>To</label><select id="cto">'+o2+'</select></div>'+
        '<div class="fr"><label>Rate</label>'+
        '<div style="display:flex;gap:6px;flex:1">'+
        '<input id="crate" type="number" value="0.92" step="0.000001" style="flex:1">'+
        '<button class="btn bs" id="clive">&#127760; Live</button></div></div>'+
        '<div id="cst" style="font-size:11px;color:var(--mu);margin-top:4px"></div>'+
        '<div class="br"><button class="btn bc" id="ccalc">Convert &rarr;</button></div>')+
      mkcard('RESULT','<div id="cres"></div>')+
      '</div>'+
      '<p style="font-size:11px;color:var(--mu);margin-top:6px">&#9432; Rates change constantly. Verify with XE.com before financial decisions.</p>';
  },
  init:function(){
    function calc(){
      var amt=+gv('camt'),rate=+gv('crate'),f=gv('cfr'),t=gv('cto');
      if(!rate){g('cres').innerHTML=rr('Enter a rate to convert','');return;}
      var res=amt*rate;
      g('cres').innerHTML=
        '<div class="rb"><div style="font-size:26px;font-weight:700;color:var(--ac)">'+
        t+' '+fmtNum(res)+'</div>'+
        '<div style="font-size:12px;color:var(--mu);margin-top:5px">'+
        amt.toLocaleString()+' '+f+' at rate '+rate+'</div></div>'+
        rr('Reverse Rate','1 '+t+' = '+fmtNum(1/rate,4)+' '+f);
    }
    function live(){
      var f=gv('cfr').toLowerCase(),t=gv('cto').toLowerCase();
      g('cst').textContent='Fetching...';
      fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/'+f+'.json')
        .then(function(r){return r.json();})
        .then(function(d){
          var rate=d[f]?d[f][t]:null;
          if(rate){g('crate').value=rate.toFixed(6);g('cst').textContent='Rate as of '+d.date;calc();}
          else{g('cst').textContent='Cannot find: '+t.toUpperCase();}
        })
        .catch(function(){g('cst').textContent='Error - check connection';});
    }
    g('pg').addEventListener('click',function(e){
      if(e.target.id==='ccalc')calc();
      if(e.target.id==='clive')live();
    });
    g('pg').addEventListener('input',function(e){
      if(e.target.id==='camt'||e.target.id==='crate')calc();
    });
    g('pg').addEventListener('change',function(e){
      if(e.target.id==='cfr'||e.target.id==='cto')calc();
    });
    calc();
  }
};

CALCS["Ohm's Law"]={
  html:function(){
    return '<h1 class="pt">&#9889; Ohm\'s Law</h1><p class="ps">Fill any two values &mdash; the rest are calculated</p>'+
      '<div class="t2">'+
      mkcard('VALUES &mdash; fill any two',
        '<div class="fr"><label>Voltage V (volts)</label><input id="ov" type="number" placeholder="leave blank"></div>'+
        '<div class="fr"><label>Current I (amps)</label><input id="oi" type="number" placeholder="leave blank"></div>'+
        '<div class="fr"><label>Resistance R (ohms)</label><input id="or" type="number" placeholder="leave blank"></div>'+
        '<div class="fr"><label>Power P (watts)</label><input id="op" type="number" placeholder="leave blank"></div>'+
        '<div class="br"><button class="btn bc" id="ocalc">Calculate &rarr;</button>'+
        '<button class="btn bs" id="ocl">Clear</button></div>')+
      mkcard('RESULTS','<div id="ores"><div class="rr"><span class="rl">Fill in two values above</span></div></div>')+
      '</div>';
  },
  init:function(){
    function nv(id){var v=gv(id);return(v!==''&&!isNaN(v))?+v:null;}
    function calc(){
      var V=nv('ov'),I=nv('oi'),R=nv('or'),P=nv('op');
      var v=V,i=I,r=R,p=P;
      if(v&&i){r=v/i;p=v*i;}
      else if(v&&r){i=v/r;p=v*v/r;}
      else if(v&&p){i=p/v;r=v*v/p;}
      else if(i&&r){v=i*r;p=i*i*r;}
      else if(i&&p){v=p/i;r=p/(i*i);}
      else if(r&&p){v=Math.sqrt(p*r);i=Math.sqrt(p/r);}
      else{g('ores').innerHTML='<div class="rr"><span class="rl">Fill in two values above</span></div>';return;}
      function fmt(x){return x<0.001?fmtNum(x*1e6,3)+' u':x<1?fmtNum(x*1000,3)+' m':fmtNum(x,4)+' ';}
      g('ores').innerHTML=rr('Voltage (V)',fmt(v)+'V','a')+rr('Current (I)',fmt(i)+'A')+
        rr('Resistance (R)',fmt(r)+'Ohm')+rr('Power (P)',fmt(p)+'W');
    }
    g('pg').addEventListener('click',function(e){
      if(e.target.id==='ocalc')calc();
      if(e.target.id==='ocl'){var ids=['ov','oi','or','op'];for(var i=0;i<ids.length;i++)g(ids[i]).value='';}
    });
    g('pg').addEventListener('input',calc);
  }
};

CALCS['Bill Splitter']={
  html:function(){
    return '<h1 class="pt">&#128176; Bill Splitter</h1><p class="ps">Split equally or by custom percentages &mdash; tip included</p>'+
      '<div class="t2">'+
      mkcard('BILL DETAILS',
        '<div class="fr"><label>Bill Amount ($)</label><input id="bamt" type="number" value="100"></div>'+
        '<div class="fr"><label>Tip (%)</label><input id="btip" type="number" value="15"></div>'+
        '<div class="fr"><label>Number of People</label><input id="bnum" type="number" value="2" min="1" max="20"></div>'+
        '<div style="margin:10px 0 6px;font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase">Split Method</div>'+
        '<label style="display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:6px;cursor:pointer">'+
        '<input type="radio" name="bm" value="equal" checked> Split Equally</label>'+
        '<label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">'+
        '<input type="radio" name="bm" value="custom"> Custom Percentages</label>'+
        '<div class="br"><button class="btn bc" id="bcalc">Calculate &rarr;</button></div>')+
      mkcard('RESULTS',
        '<div id="bres"></div>'+
        '<div id="bcust" style="display:none;margin-top:12px">'+
        '<div style="font-size:11px;font-weight:700;color:var(--mu);margin-bottom:6px">CUSTOM SPLIT</div>'+
        '<div id="brows"></div>'+
        '<div id="bptot" style="font-size:12px;font-weight:700;text-align:right;margin-top:4px"></div>'+
        '</div>')+
      '</div>'+
      mkcard('QUICK TIP REFERENCE','<div class="tg" id="btips"></div>');
  },
  init:function(){
    var cvars=[];
    function getMode(){var el=document.querySelector('input[name="bm"]:checked');return el?el.value:'equal';}
    function rebuild(){
      var n=Math.max(1,Math.min(20,(+gv('bnum'))||2));
      var base=Math.floor(1000/n)/10;
      var rem=Math.round((100-base*n)*10)/10;
      cvars=[];
      for(var i=0;i<n;i++)cvars.push(i===0?Math.round((base+rem)*10)/10:base);
      var html='';
      for(var i=0;i<cvars.length;i++){
        html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'+
          '<span style="font-size:12px;min-width:70px">Person '+(i+1)+':</span>'+
          '<input type="number" value="'+cvars[i]+'" style="width:80px" class="bpct" data-bi="'+i+'">'+
          '<span style="font-size:11px;color:var(--mu)">%</span>'+
          '<span style="font-size:12px;font-weight:600;color:var(--ac)" id="bpr'+i+'">&mdash;</span>'+
          '</div>';
      }
      g('brows').innerHTML=html;
      updatePtot();calc();
    }
    function updatePtot(){
      var t=0;for(var i=0;i<cvars.length;i++)t+=cvars[i];
      t=Math.round(t*10)/10;
      var ok=Math.abs(t-100)<0.05;
      g('bptot').textContent='Total: '+t+'%';
      g('bptot').style.color=ok?'var(--ok)':'#C53030';
    }
    function calc(){
      var amt=+gv('bamt')||0,tip=+gv('btip')||0,n=Math.max(1,(+gv('bnum'))||2);
      var ta=amt*tip/100,grand=amt+ta;
      g('bres').innerHTML=
        rr('Tip Amount',fmtMoney(ta))+rr('Grand Total',fmtMoney(grand),'a')+
        '<div style="height:6px"></div>'+
        rr('Subtotal / Person',fmtMoney(amt/n))+
        rr('Tip / Person',fmtMoney(ta/n))+
        rr('Total / Person',fmtMoney(grand/n),'a');
      var tips=[5,10,15,18,20],th='';
      for(var i=0;i<tips.length;i++){
        th+='<div class="tt"><div class="tp">'+tips[i]+'%</div>'+
          '<div class="ta">'+fmtMoney(amt*tips[i]/100)+'</div></div>';
      }
      g('btips').innerHTML=th;
      if(getMode()==='custom'){
        for(var i=0;i<cvars.length;i++){
          var el=g('bpr'+i);if(el)el.textContent=fmtMoney(grand*cvars[i]/100);
        }
      }
    }
    g('pg').addEventListener('click',function(e){if(e.target.id==='bcalc')calc();});
    g('pg').addEventListener('change',function(e){
      if(e.target.name==='bm'){
        var custom=getMode()==='custom';
        g('bcust').style.display=custom?'block':'none';
        if(custom)rebuild();else calc();
      }
    });
    g('pg').addEventListener('input',function(e){
      if(e.target.id==='bnum'){rebuild();}
      else if(e.target.classList.contains('bpct')){
        var idx=parseInt(e.target.getAttribute('data-bi'));
        cvars[idx]=+e.target.value||0;updatePtot();calc();
      }else if(e.target.id==='bamt'||e.target.id==='btip'){calc();}
    });
    rebuild();
  }
};

CALCS['Subnet CIDR']={
  html:function(){
    return '<h1 class="pt">&#127760; Subnet / CIDR Calculator</h1><p class="ps">IPv4 network analysis</p>'+
      '<div class="t2">'+
      mkcard('INPUT',
        '<div class="fr"><label>IP / CIDR</label><input id="snip" type="text" value="192.168.1.0/24" placeholder="e.g. 192.168.1.0/24"></div>'+
        '<div class="br"><button class="btn bc" id="sncalc">Calculate &rarr;</button>'+
        '<button class="btn bs" id="snsmp">Sample</button></div>')+
      mkcard('NETWORK DETAILS','<div id="snres"><div class="rr"><span class="rl">Enter CIDR above</span></div></div>')+
      '</div>';
  },
  init:function(){
    function calc(){
      try{
        var parts=gv('snip').split('/');
        var ipStr=parts[0].trim(),prefix=parseInt(parts[1]);
        if(isNaN(prefix)||prefix<0||prefix>32)throw new Error('Invalid prefix');
        var oct=ipStr.split('.');
        if(oct.length!==4)throw new Error('Invalid IP');
        oct=oct.map(Number);
        for(var i=0;i<oct.length;i++)if(oct[i]<0||oct[i]>255)throw new Error('Invalid IP');
        var ipN=(((oct[0]*256+oct[1])*256+oct[2])*256+oct[3])>>>0;
        var mask=(prefix===0?0:((-1)<<(32-prefix)))>>>0;
        var net=(ipN&mask)>>>0;
        var bcast=(net|(~mask>>>0))>>>0;
        var hosts=Math.max(0,bcast-net-1);
        function toIP(n){return [(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.');}
        function toMask(m){return [(m>>>24)&255,(m>>>16)&255,(m>>>8)&255,m&255].join('.');}
        g('snres').innerHTML=
          rr('Network',toIP(net),'a')+rr('Subnet Mask',toMask(mask))+
          rr('Broadcast',toIP(bcast))+
          rr('First Host',prefix>=31?'N/A':toIP(net+1))+
          rr('Last Host',prefix>=31?'N/A':toIP(bcast-1))+
          rr('Usable Hosts',hosts.toLocaleString(),'a')+
          rr('CIDR',toIP(net)+'/'+prefix)+
          rr('Class',oct[0]<128?'A':oct[0]<192?'B':'C');
      }catch(ex){
        g('snres').innerHTML='<div class="rr"><span class="rl" style="color:#C53030">'+ex.message+'</span></div>';
      }
    }
    g('pg').addEventListener('click',function(e){
      if(e.target.id==='sncalc')calc();
      if(e.target.id==='snsmp'){g('snip').value='10.0.0.0/8';calc();}
    });
    g('pg').addEventListener('keydown',function(e){if(e.key==='Enter')calc();});
    calc();
  }
};

CALCS['BMI Calculator']={
  html:function(){
    return '<h1 class="pt">&#127973; BMI Calculator</h1><p class="ps">For reference only &mdash; not medical advice</p>'+
      '<div class="t2">'+
      mkcard('MEASUREMENTS',
        '<div class="fr"><label>Units</label>'+
        '<select id="bmu"><option value="imp">Imperial (lbs / ft in)</option>'+
        '<option value="met">Metric (kg / cm)</option></select></div>'+
        '<div id="bmfl"></div>'+
        '<div class="br"><button class="btn bc" id="bmcalc">Calculate &rarr;</button></div>')+
      mkcard('RESULT','<div id="bmres"></div>')+
      '</div>';
  },
  init:function(){
    var scale=[[0,'Underweight','#3B82F6'],[18.5,'Normal','var(--ok)'],[25,'Overweight','#F59E0B'],[30,'Obese','#EF4444']];
    function renderF(){
      var met=gv('bmu')==='met';
      g('bmfl').innerHTML=met?
        '<div class="fr"><label>Weight (kg)</label><input id="bmkg" type="number" placeholder="70"></div>'+
        '<div class="fr"><label>Height (cm)</label><input id="bmcm" type="number" placeholder="170"></div>':
        '<div class="fr"><label>Weight (lbs)</label><input id="bmlb" type="number" placeholder="154"></div>'+
        '<div class="fr"><label>Height (ft)</label><input id="bmft" type="number" placeholder="5"></div>'+
        '<div class="fr"><label>Height (in)</label><input id="bmin" type="number" placeholder="7"></div>';
    }
    function calc(){
      var bmi;
      if(gv('bmu')==='met'){
        var kg=+gv('bmkg'),cm=+gv('bmcm');if(!kg||!cm)return;bmi=kg/((cm/100)*(cm/100));
      }else{
        var lb=+gv('bmlb'),ft=+gv('bmft'),ins=+gv('bmin');if(!lb||!ft)return;
        var tin=ft*12+ins;bmi=703*lb/(tin*tin);
      }
      var cat=scale[0];
      for(var i=0;i<scale.length;i++)if(bmi>=scale[i][0])cat=scale[i];
      var rows='';
      for(var i=0;i<scale.length;i++){
        rows+='<div class="rr"><span class="rl" style="color:'+scale[i][2]+'">&#9679; '+scale[i][1]+
          '</span><span class="rv">'+scale[i][0]+'+'+'</span></div>';
      }
      g('bmres').innerHTML=
        '<div style="text-align:center;padding:14px 0">'+
        '<div style="font-size:50px;font-weight:700;color:'+cat[2]+'">'+fmtNum(bmi,1)+'</div>'+
        '<div style="font-size:15px;font-weight:600;color:'+cat[2]+';margin-top:4px">'+cat[1]+'</div>'+
        '</div>'+rows;
    }
    g('pg').addEventListener('change',function(e){if(e.target.id==='bmu')renderF();});
    g('pg').addEventListener('click',function(e){if(e.target.id==='bmcalc')calc();});
    g('pg').addEventListener('input',calc);
    renderF();
  }
};

CALCS['Compound Interest']={
  html:function(){
    return '<h1 class="pt">&#128201; Compound Interest</h1><p class="ps">The power of compounding over time</p>'+
      '<div class="t2">'+
      mkcard('INPUTS',
        '<div class="fr"><label>Principal ($)</label><input id="cip" type="number" value="10000"></div>'+
        '<div class="fr"><label>Annual Rate (%)</label><input id="cir" type="number" value="7" step="0.1"></div>'+
        '<div class="fr"><label>Years</label><input id="cit" type="number" value="10"></div>'+
        '<div class="fr"><label>Compounds / Year</label>'+
        '<select id="cin"><option value="1">Annually</option><option value="2">Semi-annually</option>'+
        '<option value="4">Quarterly</option><option value="12" selected>Monthly</option>'+
        '<option value="365">Daily</option></select></div>'+
        '<div class="fr"><label>Monthly Contribution ($)</label><input id="cic" type="number" value="0"></div>'+
        '<div class="br"><button class="btn bc" id="cicalc">Calculate &rarr;</button></div>')+
      mkcard('RESULTS','<div id="cires"></div>')+
      '</div>';
  },
  init:function(){
    function calc(){
      var P=+gv('cip'),r=+gv('cir')/100,t=+gv('cit'),n=+gv('cin'),c=+gv('cic');
      if(!P||r<=0||t<=0)return;
      var base=P*Math.pow(1+r/n,n*t);
      var contrib=c>0?c*(Math.pow(1+r/n,n*t)-1)/(r/n):0;
      var total=base+contrib;
      var invested=P+c*12*t;
      g('cires').innerHTML=
        rr('Final Balance',fmtMoney(total),'a')+
        rr('Principal',fmtMoney(P))+
        rr('Contributions',fmtMoney(c*12*t))+
        rr('Interest Earned',fmtMoney(total-invested),'s')+
        rr('Total Return',fmtNum(((total/invested)-1)*100,1)+'%');
    }
    g('pg').addEventListener('click',function(e){if(e.target.id==='cicalc')calc();});
    g('pg').addEventListener('input',calc);
    g('pg').addEventListener('change',calc);
    calc();
  }
};
