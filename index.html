<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1F3864">
<meta name="description" content="48 calculators across 8 categories — free, offline, no ads">
<title>Beeran's Calculator Suite</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
/* ── Design System ─────────────────────────────── */
:root{
  --nav-bg:#1F3864;--nav-act:#2F5496;--nav-hov:#16294E;
  --accent:#1565C0;--app-bg:#EEF2F7;--card:#fff;
  --input-bg:#EBF3FB;--res-bg:#D6E4F0;
  --text:#1A202C;--muted:#718096;--border:#CBD5E0;
  --success:#276749;--sidebar:220px;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--app-bg);color:var(--text);
  display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ───────────────────────────────────── */
#sidebar{
  width:var(--sidebar);min-width:var(--sidebar);background:var(--nav-bg);
  display:flex;flex-direction:column;height:100vh;overflow:hidden;
  transition:transform .25s;z-index:100;
}
.logo{padding:22px 16px 16px;text-align:center;border-bottom:1px solid var(--nav-act)}
.logo-text{font-size:15px;font-weight:700;color:#fff;line-height:1.5}
.logo-sub{font-size:11px;color:#90C8F0;margin-top:2px}
.nav-sep{height:1px;background:var(--nav-act);margin:8px 16px}
.nav-scroll{flex:1;overflow-y:auto;padding:6px 0}
.nav-scroll::-webkit-scrollbar{width:4px}
.nav-scroll::-webkit-scrollbar-track{background:transparent}
.nav-scroll::-webkit-scrollbar-thumb{background:var(--nav-act);border-radius:2px}
.nav-btn{
  display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;
  background:transparent;border:none;color:#fff;font:600 13px var(--font);
  cursor:pointer;text-align:left;border-radius:6px;margin:1px 8px;
  width:calc(100% - 16px);transition:background .15s;
}
.nav-btn:hover{background:var(--nav-hov)}
.nav-btn.active{background:var(--nav-act)}
.nav-btn .icon{font-size:16px;width:20px;text-align:center}
.back-btn{
  display:flex;align-items:center;gap:8px;width:calc(100% - 16px);margin:4px 8px;
  padding:8px 12px;background:var(--nav-hov);border:none;color:#90C8F0;
  font:600 12px var(--font);cursor:pointer;border-radius:6px;
}
.subnav-title{font-size:10px;color:#90C8F0;padding:10px 16px 4px;text-transform:uppercase;letter-spacing:.8px}
.sidebar-bottom{padding:10px 8px;border-top:1px solid var(--nav-act)}
.sidebar-btn{
  display:flex;align-items:center;gap:8px;width:100%;padding:9px 12px;
  background:var(--nav-act);border:none;color:#fff;font:600 12px var(--font);
  cursor:pointer;border-radius:8px;margin-top:4px;
}
.sidebar-btn:hover{background:var(--nav-hov)}
.sidebar-btn.about-btn{background:var(--nav-hov)}

/* ── Content ───────────────────────────────────── */
#content{flex:1;overflow-y:auto;position:relative}
#content::-webkit-scrollbar{width:6px}
#content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.page{padding:28px 28px;max-width:1100px}

/* ── Hamburger (mobile) ────────────────────────── */
#ham{
  display:none;position:fixed;top:12px;left:12px;z-index:200;
  background:var(--nav-bg);border:none;border-radius:8px;
  color:#fff;font-size:20px;width:40px;height:40px;cursor:pointer;
}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}

/* ── Cards & Layout ───────────────────────────── */
.page-title{font-size:22px;font-weight:700;color:var(--nav-bg);margin-bottom:4px}
.page-sub{font-size:11px;color:var(--muted);margin-bottom:20px}
.card{background:var(--card);border-radius:10px;border:1px solid var(--border);overflow:hidden;margin-bottom:14px}
.card-header{background:var(--nav-bg);color:#fff;font:700 12px var(--font);padding:8px 14px;text-transform:uppercase;letter-spacing:.5px}
.card-body{padding:16px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* ── Form Elements ─────────────────────────────── */
.form-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.form-row label{font-size:12px;color:var(--text);min-width:180px;flex-shrink:0}
input,select{
  font:13px var(--font);background:var(--input-bg);border:1px solid #B8CCE4;
  border-radius:6px;padding:7px 10px;color:var(--text);width:100%;outline:none;
}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(21,101,192,.15)}
.btn-row{display:flex;gap:8px;margin-top:14px}
.btn{
  padding:8px 18px;border:none;border-radius:8px;font:700 12px var(--font);
  cursor:pointer;transition:filter .15s;
}
.btn:hover{filter:brightness(1.1)}
.btn-calc{background:var(--accent);color:#fff}
.btn-sm{background:var(--border);color:var(--text);padding:6px 12px}

/* ── Results ───────────────────────────────────── */
.result-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid #F0F4F8;
}
.result-row:last-child{border-bottom:none}
.result-label{font-size:11px;color:var(--muted)}
.result-val{font-size:13px;font-weight:700;color:var(--text)}
.result-val.accent{color:var(--accent)}
.result-val.success{color:var(--success)}
.res-block{background:var(--res-bg);border-radius:8px;padding:14px 16px;margin-top:10px}

/* ── Quick ref tiles ──────────────────────────── */
.tip-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:10px}
.tip-tile{background:var(--input-bg);border:1px solid var(--border);border-radius:10px;
  text-align:center;padding:10px 6px}
.tip-pct{font:700 15px var(--font);color:var(--accent)}
.tip-amt{font-size:12px;color:var(--text);margin-top:3px}

/* ── Basic Calculator ─────────────────────────── */
.calc-display{
  background:#0D1B2A;color:#fff;font:400 28px 'Courier New',monospace;
  padding:16px;border-radius:8px;text-align:right;min-height:62px;
  word-break:break-all;margin-bottom:10px;
}
.calc-display .expr{font-size:13px;color:#90C8F0;min-height:18px}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.calc-key{
  padding:14px 8px;border:none;border-radius:8px;font:600 15px var(--font);
  cursor:pointer;transition:filter .15s;
}
.calc-key:hover{filter:brightness(.9)}
.calc-key:active{filter:brightness(.8)}
.k-num{background:#EBF3FB;color:var(--text)}
.k-op{background:var(--nav-act);color:#fff}
.k-eq{background:var(--accent);color:#fff}
.k-fn{background:var(--border);color:var(--text)}
.k-span2{grid-column:span 2}
.k-span4{grid-column:span 4}

/* ── Stats strip ──────────────────────────────── */
.stats-strip{
  background:var(--nav-bg);border-radius:10px;display:grid;
  grid-template-columns:repeat(3,1fr);margin-bottom:20px;padding:0;overflow:hidden
}
.stat-cell{text-align:center;padding:20px 8px}
.stat-num{font-size:36px;font-weight:700;color:#90C8F0}
.stat-lbl{font-size:12px;color:#fff;margin-top:3px}

/* ── Coming Soon ──────────────────────────────── */
.coming-soon{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 20px;text-align:center;color:var(--muted);min-height:300px;
}
.coming-soon-icon{font-size:48px;margin-bottom:16px;opacity:.5}
.coming-soon h3{font-size:18px;color:var(--nav-bg);margin-bottom:8px}
.coming-soon p{font-size:13px;max-width:320px;line-height:1.6}

/* ── About ────────────────────────────────────── */
.about-card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:28px;margin-bottom:14px}
.about-intro{font-size:13px;line-height:1.7;color:var(--text);margin-bottom:16px}
.quote-box{background:var(--res-bg);border-radius:8px;padding:16px 20px;font-style:italic;font-size:13px;color:var(--nav-bg);margin:16px 0;line-height:1.6}
.credits{font-size:12px;color:var(--muted);margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
textarea{
  width:100%;font:13px var(--font);padding:10px;background:var(--input-bg);
  border:1px solid #B8CCE4;border-radius:8px;resize:vertical;min-height:100px;
  color:var(--text);outline:none;
}
textarea:focus{border-color:var(--accent)}

/* ── Mobile ───────────────────────────────────── */
@media(max-width:700px){
  #ham{display:flex;align-items:center;justify-content:center}
  #sidebar{position:fixed;left:0;top:0;transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  .overlay.open{display:block}
  #content{padding-top:56px}
  .page{padding:16px}
  .two-col,.three-col{grid-template-columns:1fr}
  .tip-grid{grid-template-columns:repeat(3,1fr)}
  .stats-strip{grid-template-columns:1fr}
  .form-row{flex-direction:column;align-items:flex-start}
  .form-row label{min-width:unset}
}
</style>
</head>
<body>

<button id="ham" onclick="toggleSidebar()" aria-label="Menu">&#9776;</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="logo">
    <div class="logo-text">🧮 Beeran's</div>
    <div class="logo-text">Calculator Suite</div>
    <div class="logo-sub">48 calculators · 8 categories</div>
  </div>

  <!-- Main nav (shown by default) -->
  <div class="nav-scroll" id="main-nav">
    <div id="nav-items"></div>
  </div>

  <!-- Sub-nav (shown when drilling into a category) -->
  <div class="nav-scroll" id="sub-nav" style="display:none">
    <button class="back-btn" onclick="backToMain()">&#8592; Back to Main</button>
    <div class="subnav-title" id="subnav-title"></div>
    <div id="subnav-items"></div>
  </div>

  <div class="sidebar-bottom">
    <button class="sidebar-btn" onclick="navigate('settings')">⚙&nbsp; Settings</button>
    <button class="sidebar-btn about-btn" onclick="navigate('about')">ℹ️&nbsp; About</button>
  </div>
</nav>

<!-- CONTENT -->
<main id="content">
  <div id="app-page" class="page"></div>
</main>

<script>
// ═══════════════════════════════════════════════
// DATA — Categories & Calculators
// ═══════════════════════════════════════════════
const CATEGORIES = [
  { id:'basic',       icon:'🔢', label:'Basic Calculator',      calcs:['Basic Calculator'] },
  { id:'scientific',  icon:'🔬', label:'Scientific & Graphing', calcs:['Scientific Calculator'] },
  { id:'construction',icon:'🏗️', label:'Construction',
    calcs:['Area','Batten Spacing','Concrete Volume','Corner Angle','Crown Molding',
           'Decking','Diagonal','Frame Spacing','Lumber','Miter Joint',
           'Overlapping Boards','Parquet Floor','Ramp','Roofing','Slope','Stairs','Volume'] },
  { id:'conversion',  icon:'🔄', label:'Conversion',
    calcs:['Currency Converter','Time & Date','Unit Converter'] },
  { id:'electronics', icon:'⚡', label:'Electronics',
    calcs:"Ohm's Law,Series & Parallel,Voltage Divider".split(',') },
  { id:'finance',     icon:'💹', label:'Finance',
    calcs:['Amortization','Bill Splitter','Compound Interest','Credit Card Payoff',
           'Depreciation','Loan','MACRS Full','MACRS Rate','Mortgage','ROI','Savings Goal'] },
  { id:'networking',  icon:'🌐', label:'IT Networking',
    calcs:['Binary ↔ Hex','IP Converter','IPv6 Calculator','Subnet / CIDR',
           'Subnet Cheat Sheet','Supernet'] },
  { id:'medical',     icon:'🏥', label:'Medical',
    calcs:['BMI Calculator','Body Surface Area','Drug Dosage',
           'IV Drip Rate','Opioid Conversion','Pharmacy Dilution'] },
];

// Calculators that have a full implementation
const IMPLEMENTED = new Set([
  'Basic Calculator','Area','Currency Converter',
  "Ohm's Law",'Bill Splitter','Subnet / CIDR','BMI Calculator',
  'Compound Interest'
]);

// ═══════════════════════════════════════════════
// ROUTER
// ═══════════════════════════════════════════════
let currentCat = null;
let currentCalc = null;

function buildNav() {
  const container = document.getElementById('nav-items');
  container.innerHTML = CATEGORIES.map(cat => `
    <button class="nav-btn" id="nav-${cat.id}"
      onclick="${cat.calcs.length===1 ? `navigateCalc('${cat.id}','${cat.calcs[0]}')` : `openCategory('${cat.id}')`}">
      <span class="icon">${cat.icon}</span>${cat.label}
    </button>
  `).join('');
}

function openCategory(catId) {
  const cat = CATEGORIES.find(c=>c.id===catId);
  currentCat = catId;
  document.getElementById('main-nav').style.display = 'none';
  document.getElementById('sub-nav').style.display = 'flex';
  document.getElementById('sub-nav').style.flexDirection = 'column';
  document.getElementById('subnav-title').textContent = cat.label;
  document.getElementById('subnav-items').innerHTML = cat.calcs.map(name => `
    <button class="nav-btn" id="subnav-${btoa(name).replace(/=/g,'')}"
      onclick="navigateCalc('${catId}','${name.replace(/'/g,"\\'")}')">
      ${name}
    </button>
  `).join('');
  // Auto-select first
  navigateCalc(catId, cat.calcs[0]);
  closeMobile();
}

function backToMain() {
  document.getElementById('main-nav').style.display = 'flex';
  document.getElementById('main-nav').style.flexDirection = 'column';
  document.getElementById('sub-nav').style.display = 'none';
  currentCat = null;
}

function navigateCalc(catId, calcName) {
  // Highlight nav
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const key = btoa(calcName).replace(/=/g,'');
  const btn = document.getElementById(`subnav-${key}`) || document.getElementById(`nav-${catId}`);
  if(btn) btn.classList.add('active');
  currentCalc = calcName;
  const page = document.getElementById('app-page');
  if(IMPLEMENTED.has(calcName)) {
    page.innerHTML = CALCS[calcName]?.html() || comingSoon(calcName);
    CALCS[calcName]?.init?.();
  } else {
    page.innerHTML = comingSoon(calcName);
  }
  closeMobile();
}

function navigate(id) {
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const page = document.getElementById('app-page');
  if(id==='about') page.innerHTML = aboutPage();
  if(id==='settings') page.innerHTML = settingsPage(); initSettings();
  closeMobile();
}

function comingSoon(name) {
  return `<div class="coming-soon">
    <div class="coming-soon-icon">🔧</div>
    <h3>${name}</h3>
    <p>This calculator is coming in the next release. The desktop app has the full version — download it from the <a href="https://github.com" style="color:var(--accent)">GitHub releases page</a>.</p>
  </div>`;
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
const fmt$ = v => '$' + parseFloat(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtN = (v,d=2) => parseFloat(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const g = id => document.getElementById(id);
const gv = id => g(id)?.value || '';

function resultRow(label,val,cls=''){
  return `<div class="result-row"><span class="result-label">${label}</span><span class="result-val ${cls}">${val}</span></div>`;
}

function card(header,body){
  return `<div class="card"><div class="card-header">${header}</div><div class="card-body">${body}</div></div>`;
}

// ═══════════════════════════════════════════════
// CALCULATORS
// ═══════════════════════════════════════════════
const CALCS = {};

// ── Basic Calculator ────────────────────────────
CALCS['Basic Calculator'] = {
  html(){return `
<h1 class="page-title">🔢 Basic Calculator</h1>
<p class="page-sub">Full keyboard support</p>
<div style="max-width:340px">
  <div class="calc-display">
    <div class="expr" id="bc-expr">&nbsp;</div>
    <div id="bc-disp">0</div>
  </div>
  <div class="calc-grid">
    <button class="calc-key k-fn" onclick="bc('AC')">AC</button>
    <button class="calc-key k-fn" onclick="bc('+/-')">+/−</button>
    <button class="calc-key k-fn" onclick="bc('%')">%</button>
    <button class="calc-key k-op" onclick="bc('/')">÷</button>
    <button class="calc-key k-num" onclick="bc('7')">7</button>
    <button class="calc-key k-num" onclick="bc('8')">8</button>
    <button class="calc-key k-num" onclick="bc('9')">9</button>
    <button class="calc-key k-op" onclick="bc('*')">×</button>
    <button class="calc-key k-num" onclick="bc('4')">4</button>
    <button class="calc-key k-num" onclick="bc('5')">5</button>
    <button class="calc-key k-num" onclick="bc('6')">6</button>
    <button class="calc-key k-op" onclick="bc('-')">−</button>
    <button class="calc-key k-num" onclick="bc('1')">1</button>
    <button class="calc-key k-num" onclick="bc('2')">2</button>
    <button class="calc-key k-num" onclick="bc('3')">3</button>
    <button class="calc-key k-op" onclick="bc('+')">+</button>
    <button class="calc-key k-num k-span2" onclick="bc('0')">0</button>
    <button class="calc-key k-num" onclick="bc('.')">.</button>
    <button class="calc-key k-eq" onclick="bc('=')">=</button>
  </div>
</div>`},
  init(){
    let cur='0', expr='', op='', prev='', fresh=false;
    const dsp=()=>{g('bc-disp').textContent=cur; g('bc-expr').textContent=expr||'\u00a0'};
    window.bc=k=>{
      if(k>='0'&&k<='9'||k==='.'){
        if(k==='.'&&cur.includes('.'))return;
        cur=(fresh||cur==='0')&&k!=='.'?k:cur+k; fresh=false;
      } else if('+-*/'.includes(k)){
        if(op&&!fresh){try{cur=String(eval(prev+op+cur))}catch(e){}}
        prev=cur; op=k; expr=cur+' '+(k==='*'?'×':k==='/'?'÷':k)+' '; fresh=true;
      } else if(k==='='){
        if(!op)return;
        try{expr=cur+' ='; cur=String(eval(prev+op+cur)); op=''; prev=''; fresh=true;}catch(e){cur='Error';}
      } else if(k==='AC'){cur='0';expr='';op='';prev='';fresh=false;}
      else if(k==='+/-'){cur=cur.startsWith('-')?cur.slice(1):'-'+cur;}
      else if(k==='%'){try{cur=String(parseFloat(cur)/100)}catch(e){}}
      dsp();
    };
    document.onkeydown=e=>{
      const m={'Enter':'=','Backspace':'AC','Escape':'AC'};
      const k=m[e.key]||e.key;
      if('0123456789.+-*/='.includes(k)||k==='AC') bc(k);
    };
    dsp();
  }
};

// ── Area Calculator ─────────────────────────────
CALCS['Area'] = {
  html(){return `
<h1 class="page-title">📐 Area Calculator</h1>
<p class="page-sub">Rectangle, circle, triangle, and more</p>
<div class="two-col">
  ${card('SHAPE & DIMENSIONS',`
    <div class="form-row"><label>Shape</label>
      <select id="area-shape" onchange="areaCalc()">
        <option>Rectangle</option><option>Square</option>
        <option>Circle</option><option>Triangle</option>
        <option>Trapezoid</option>
      </select>
    </div>
    <div id="area-fields"></div>
    <div class="btn-row">
      <button class="btn btn-calc" onclick="areaCalc()">Calculate →</button>
      <button class="btn btn-sm" onclick="areaClear()">Clear</button>
    </div>
  `)}
  ${card('RESULTS',`<div id="area-results"><div class="result-row"><span class="result-label">Fill in dimensions</span><span class="result-val">—</span></div></div>`)}
</div>`},
  init(){
    const shapes={
      Rectangle:[['Length (ft)','area-l'],['Width (ft)','area-w']],
      Square:[['Side (ft)','area-s']],
      Circle:[['Radius (ft)','area-r']],
      Triangle:[['Base (ft)','area-b'],['Height (ft)','area-h']],
      Trapezoid:[['Base 1 (ft)','area-b1'],['Base 2 (ft)','area-b2'],['Height (ft)','area-th']],
    };
    const render=()=>{
      const s=gv('area-shape');
      g('area-fields').innerHTML=shapes[s].map(([l,i])=>`
        <div class="form-row"><label>${l}</label>
        <input id="${i}" type="number" placeholder="0" oninput="areaCalc()"></div>`).join('');
    };
    window.areaCalc=()=>{
      const s=gv('area-shape'); let a=NaN,p=NaN;
      try{
        if(s==='Rectangle'){const l=+gv('area-l'),w=+gv('area-w');a=l*w;p=2*(l+w);}
        else if(s==='Square'){const x=+gv('area-s');a=x*x;p=4*x;}
        else if(s==='Circle'){const r=+gv('area-r');a=Math.PI*r*r;p=2*Math.PI*r;}
        else if(s==='Triangle'){a=.5*+gv('area-b')*+gv('area-h');}
        else if(s==='Trapezoid'){a=.5*(+gv('area-b1')++gv('area-b2'))*+gv('area-th');}
      }catch(e){}
      g('area-results').innerHTML=
        resultRow('Area (sq ft)',isNaN(a)?'—':fmtN(a)+' ft²','accent')+
        (isNaN(p)?'':resultRow('Perimeter',fmtN(p)+' ft'))+
        (isNaN(a)?'':resultRow('Area (sq m)',fmtN(a*0.0929)+' m²'));
    };
    window.areaClear=()=>{document.querySelectorAll('#area-fields input').forEach(i=>i.value='');areaCalc();};
    render(); g('area-shape').onchange=render;
  }
};

// ── Currency Converter ──────────────────────────
CALCS['Currency Converter'] = {
  html(){
    const CURRENCIES=['AED','AUD','BRL','CAD','CHF','CNY','COP','DKK','EGP',
      'EUR','GBP','HKD','IDR','INR','JPY','KRW','MXN','NOK','NZD','PHP',
      'PKR','QAR','SAR','SEK','SGD','THB','TRY','TTD','USD','ZAR'];
    const opts=CURRENCIES.map(c=>`<option${c==='USD'?' selected':''}>${c}</option>`).join('');

// ── Ohm's Law ───────────────────────────────────
CALCS["Ohm's Law"] = {
  html(){return `
<h1 class="page-title">⚡ Ohm's Law</h1>
<p class="page-sub">Fill any two values — the rest are calculated automatically</p>
<div class="two-col">
  ${card('VALUES — fill any two',`
    <div class="form-row"><label>⚡ Voltage V (volts)</label><input id="ohm-v" type="number" placeholder="—" oninput="ohmCalc()"></div>
    <div class="form-row"><label>⚡ Current I (amps)</label><input id="ohm-i" type="number" placeholder="—" oninput="ohmCalc()"></div>
    <div class="form-row"><label>🔌 Resistance R (ohms)</label><input id="ohm-r" type="number" placeholder="—" oninput="ohmCalc()"></div>
    <div class="form-row"><label>💡 Power P (watts)</label><input id="ohm-p" type="number" placeholder="—" oninput="ohmCalc()"></div>
    <div class="btn-row"><button class="btn btn-sm" onclick="ohmClear()">Clear</button></div>
  `)}
  ${card('RESULTS',`<div id="ohm-results"><div class="result-row"><span class="result-label">Fill in two values above</span></div></div>`)}
</div>`},
  init(){
    window.ohmCalc=()=>{
      const V=gv('ohm-v'),I=gv('ohm-i'),R=gv('ohm-r'),P=gv('ohm-p');
      const n=v=>v!==''&&!isNaN(v)?+v:null;
      let v=n(V),i=n(I),r=n(R),p=n(P);
      // Solve
      if(v&&i){r=v/i;p=v*i;}
      else if(v&&r){i=v/r;p=v*v/r;}
      else if(v&&p){i=p/v;r=v*v/p;}
      else if(i&&r){v=i*r;p=i*i*r;}
      else if(i&&p){v=p/i;r=p/(i*i);}
      else if(r&&p){v=Math.sqrt(p*r);i=Math.sqrt(p/r);}
      else{g('ohm-results').innerHTML='<div class="result-row"><span class="result-label">Fill in two values above</span></div>';return;}
      const f=x=>x<.001?fmtN(x*1e6,3)+' μ':x<1?fmtN(x*1000,3)+' m':fmtN(x,4)+' ';
      g('ohm-results').innerHTML=
        resultRow('Voltage (V)',f(v)+'V','accent')+
        resultRow('Current (I)',f(i)+'A')+
        resultRow('Resistance (R)',f(r)+'Ω')+
        resultRow('Power (P)',f(p)+'W');
    };
    window.ohmClear=()=>['ohm-v','ohm-i','ohm-r','ohm-p'].forEach(id=>{g(id).value=''});
  }
};

CALCS['Subnet / CIDR'] = {
  html(){return `
<h1 class="page-title">🌐 Subnet / CIDR Calculator</h1>
<p class="page-sub">IPv4 network analysis from CIDR notation</p>
<div class="two-col">
  ${card('INPUT',`
    <div class="form-row"><label>IP Address / CIDR</label>
      <input id="sub-ip" type="text" placeholder="192.168.1.0/24" value="192.168.1.0/24">
    </div>
    <div class="btn-row">
      <button class="btn btn-calc" onclick="subCalc()">Calculate →</button>
      <button class="btn btn-sm" onclick="g('sub-ip').value='10.0.0.0/8';subCalc()">Sample</button>
    </div>
  `)}
  ${card('NETWORK DETAILS',`<div id="sub-results"><div class="result-row"><span class="result-label">Enter CIDR above</span></div></div>`)}
</div>`},
  init(){
    window.subCalc=()=>{
      try{
        const [ipStr,prefixStr]=gv('sub-ip').split('/');
        const prefix=parseInt(prefixStr);
        if(isNaN(prefix)||prefix<0||prefix>32)throw new Error('Invalid prefix');
        const parts=ipStr.trim().split('.').map(Number);
        if(parts.length!==4||parts.some(p=>p<0||p>255))throw new Error('Invalid IP');
        const ipNum=parts.reduce((a,b)=>(a<<8)+b,0)>>>0;
        const mask=(prefix===0?0:(-1<<(32-prefix)))>>>0;
        const network=(ipNum&mask)>>>0;
        const broadcast=(network|(~mask>>>0))>>>0;
        const first=(network+1)>>>0, last=(broadcast-1)>>>0;
        const hosts=Math.max(0,broadcast-network-1);
        const toIP=n=>[(n>>24)&255,(n>>16)&255,(n>>8)&255,n&255].join('.');
        const toMask=m=>[(m>>24)&255,(m>>16)&255,(m>>8)&255,m&255].join('.');
        g('sub-results').innerHTML=
          resultRow('Network Address',toIP(network),'accent')+
          resultRow('Subnet Mask',toMask(mask))+
          resultRow('Broadcast Address',toIP(broadcast))+
          resultRow('First Host',prefix>=31?'N/A':toIP(first))+
          resultRow('Last Host',prefix>=31?'N/A':toIP(last))+
          resultRow('Usable Hosts',hosts.toLocaleString(),'accent')+
          resultRow('CIDR Notation',`${toIP(network)}/${prefix}`)+
          resultRow('Class',ipNum>>>24<128?'A':ipNum>>>24<192?'B':'C');
      }catch(e){
        g('sub-results').innerHTML=`<div class="result-row"><span class="result-label" style="color:#C53030">Error: ${e.message}</span></div>`;
      }
    };
    subCalc();
  }
};

      const total=base+contrib;
      const interest=total-P-c*12*t;
      g('ci-results').innerHTML=
        resultRow('Final Balance',fmt$(total),'accent')+
        resultRow('Principal',fmt$(P))+
        resultRow('Contributions',fmt$(c*12*t))+
        resultRow('Interest Earned',fmt$(interest),'success')+
        resultRow('Return',fmtN(((total/(P+c*12*t))-1)*100)+'%');
    };
    ciCalc();
  }
};

  saveSettings({theme,font});
  const sizes={smaller:'13px',default:'15px',larger:'17px'};
  document.documentElement.style.setProperty('font-size',sizes[font]||'15px');
  if(theme==='dark'){
    document.documentElement.style.setProperty('--app-bg','#1a1a2e');
    document.documentElement.style.setProperty('--card','#16213e');
    document.documentElement.style.setProperty('--text','#e0e0e0');
    document.documentElement.style.setProperty('--border','#2a2a4a');
    document.documentElement.style.setProperty('--input-bg','#0f3460');
    document.documentElement.style.setProperty('--res-bg','#0f3460');
    document.documentElement.style.setProperty('--muted','#a0a0b0');
  } else {
    document.documentElement.style.setProperty('--app-bg','#EEF2F7');
    document.documentElement.style.setProperty('--card','#fff');
    document.documentElement.style.setProperty('--text','#1A202C');
    document.documentElement.style.setProperty('--border','#CBD5E0');
    document.documentElement.style.setProperty('--input-bg','#EBF3FB');
    document.documentElement.style.setProperty('--res-bg','#D6E4F0');
    document.documentElement.style.setProperty('--muted','#718096');
  }
};

// ═══════════════════════════════════════════════
// MOBILE
// ═══════════════════════════════════════════════
window.toggleSidebar=()=>{
  g('sidebar').classList.toggle('open');
  g('overlay').classList.toggle('open');
};
window.closeMobile=()=>{
  g('sidebar').classList.remove('open');
  g('overlay').classList.remove('open');
};

// ═══════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════
buildNav();
// Apply saved settings silently on load
const _s=loadSettings();
if(_s.theme||_s.font){
  if(g('set-theme'))g('set-theme').value=_s.theme||'light';
  if(g('set-font'))g('set-font').value=_s.font||'default';
  applySettings();
}
// Start on Basic Calculator
navigateCalc('basic','Basic Calculator');

// PWA
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
