CALCS['Ramp']={
  html:function(){return(
    '<h1 class="pt">Ramp Calculator</h1><p class="ps">Rise, run, length, angle &mdash; ADA compliance check</p>'+
    '<div class="t2">'+
    card('RAMP DETAILS',
      '<div class="fr"><label>Rise (vertical height, in)</label><input id="rpRise" type="number" value="7"></div>'+
      '<div class="fr"><label>Run (horizontal distance, in)</label><input id="rpRun" type="number" placeholder="auto-calculated"></div>'+
      '<div class="fr"><label>Width (in)</label><input id="rpW" type="number" value="36"></div>'+
      '<div class="fr"><label>ADA Max Slope</label>'+
      '<select id="rpADA"><option value="12">1:12 (standard, 4.76\u00b0)</option>'+
      '<option value="10">1:10 (existing structures)</option>'+
      '<option value="8">1:8 (existing structures)</option></select></div>'+
      '<div class="br"><button class="btn bc" id="rpCalc">Calculate</button></div>')+
    card('RESULTS','<div id="rpRes"></div>')+
    '</div>'+
    '<canvas id="rpCv" style="width:100%;height:220px;border-radius:8px;background:#f0f4f8;display:block;margin-top:14px"></canvas>');},
  init:function(){
    function calc(){
      var rise=+gv('rpRise'),run=+gv('rpRun'),w=+gv('rpW'),adaRatio=+gv('rpADA');
      if(!rise)return;
      if(!run)run=rise*adaRatio;
      var length=Math.sqrt(rise*rise+run*run);
      var angle=Math.atan(rise/run)*180/Math.PI;
      var slope=rise/run;
      var adaMin=rise*adaRatio;
      var adaOk=run>=adaMin;
      g('rpRes').innerHTML=
        rr('Rise',fmtN(rise,2)+'"')+
        rr('Run',fmtN(run,2)+'"','a')+
        rr('Ramp Length',fmtN(length,2)+'" ('+fmtN(length/12,2)+"')")+
        rr('Angle',fmtN(angle,2)+'\u00b0')+
        rr('Slope Ratio','1 : '+fmtN(run/rise,2))+
        rr('Slope %',fmtN(slope*100,1)+'%')+
        '<div style="padding:8px 0;font-weight:700;color:'+(adaOk?'var(--ok)':'#C53030')+'">'+
        'ADA Compliance: '+(adaOk?'\u2713 Compliant':'&#9888; Non-compliant (min run: '+adaMin+'")')+
        '</div>';
    }
    function drawRamp(){
      var cv=document.getElementById('rpCv');if(!cv)return;
      var W=cv.clientWidth||500;cv.width=W;cv.height=220;
      var ctx=cv.getContext('2d');ctx.clearRect(0,0,W,220);
      var rise=+gv('rpRise')||7,adaR=+gv('rpADA')||12;
      var run=+gv('rpRun')||rise*adaR;
      var ang=Math.atan(rise/run)*180/Math.PI;
      var PAD=50,sc=Math.min((W-PAD*2)/run,150/rise);
      var rw=run*sc,rh=rise*sc;
      var ox=PAD,oy=30+rh;
      ctx.strokeStyle='#CBD5E0';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(ox-10,oy);ctx.lineTo(ox+rw+20,oy);ctx.stroke();
      ctx.fillStyle='#D6E4F0';
      ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+rw,oy);ctx.lineTo(ox+rw,oy-rh);ctx.closePath();ctx.fill();
      ctx.strokeStyle='#1565C0';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+rw,oy-rh);ctx.stroke();
      ctx.strokeStyle='#1F3864';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
      ctx.beginPath();ctx.moveTo(ox+rw,oy);ctx.lineTo(ox+rw,oy-rh);ctx.stroke();
      ctx.setLineDash([]);
      ctx.strokeStyle='#276749';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(ox,oy,28,-(ang*Math.PI/180),0);ctx.stroke();
      var adaOk=run>=rise*adaR;
      ctx.font='bold 11px Segoe UI,sans-serif';
      ctx.fillStyle='#1F3864';ctx.textAlign='center';
      ctx.fillText('Run: '+run.toFixed(1)+'"',ox+rw/2,oy+18);
      ctx.save();ctx.translate(ox+rw+16,oy-rh/2);
      ctx.textAlign='left';ctx.fillText('Rise: '+rise.toFixed(1)+'"',0,0);ctx.restore();
      ctx.fillStyle='#276749';ctx.textAlign='left';
      ctx.fillText(ang.toFixed(1)+'\u00b0',ox+32,oy-8);
      ctx.fillStyle=adaOk?'#276749':'#C53030';ctx.textAlign='center';
      ctx.fillText(adaOk?'\u2713 ADA Compliant':'\u26a0 ADA Non-compliant',W/2,18);
    }
    g('pg').addEventListener('click',function(e){if(e.target.id==='rpCalc')calc();});
    g('pg').addEventListener('input',function(){calc();drawRamp();});
    g('pg').addEventListener('change',function(){calc();drawRamp();});
    calc();drawRamp();
    window.addEventListener('resize',drawRamp);
  }
};

// ── Construction: Roofing ─────────────────────────────────────────────────────
CALCS['Roofing']={
  html:function(){return(
    '<h1 class="pt">Roofing Calculator</h1><p class="ps">Squares of roofing material needed with pitch adjustment</p>'+
    '<div class="t2">'+
    card('ROOF DETAILS',
      '<div class="fr"><label>Building Length (ft)</label><input id="rfL" type="number" value="40"></div>'+
      '<div class="fr"><label>Building Width (ft)</label><input id="rfW" type="number" value="30"></div>'+
      '<div class="fr"><label>Roof Pitch (rise in 12)</label>'+
      '<select id="rfP"><option value="0">Flat (0/12)</option>'+
      '<option value="3">3/12</option><option value="4">4/12</option>'+
      '<option value="5">5/12</option><option value="6" selected>6/12</option>'+
      '<option value="7">7/12</option><option value="8">8/12</option>'+
      '<option value="9">9/12</option><option value="12">12/12</option></select></div>'+
      '<div class="fr"><label>Overhang Each Side (ft)</label><input id="rfOv" type="number" value="1" step="0.5"></div>'+
      '<div class="fr"><label>Waste Factor (%)</label><input id="rfWaste" type="number" value="10"></div>'+
      '<div class="br"><button class="btn bc" id="rfCalc">Calculate</button></div>')+
    card('RESULTS','<div id="rfRes"></div>')+
    '</div>'+
    '<canvas id="rfCv" style="width:100%;height:220px;border-radius:8px;background:#f0f4f8;display:block;margin-top:14px"></canvas>');},
  init:function(){
    function calc(){
      var L=+gv('rfL'),W=+gv('rfW'),pitch=+gv('rfP'),ov=+gv('rfOv'),waste=+gv('rfWaste');
      if(!L||!W)return;
      var footprint=(L+ov*2)*(W+ov*2);
      var slopeMultiplier=Math.sqrt(1+Math.pow(pitch/12,2));
      var roofArea=footprint*slopeMultiplier;
      var squares=roofArea/100;
      var withWaste=squares*(1+waste/100);
      var angle=Math.atan(pitch/12)*180/Math.PI;
      g('rfRes').innerHTML=
        rr('Footprint Area',fmtN(footprint,1)+' sq ft')+
        rr('Pitch Multiplier',fmtN(slopeMultiplier,4)+'x')+
        rr('Pitch Angle',fmtN(angle,1)+'\u00b0')+
        rr('Roof Area',fmtN(roofArea,1)+' sq ft','a')+
        rr('Squares',fmtN(squares,2)+' squares')+
        rr('Squares with '+waste+'% Waste',fmtN(withWaste,2)+' squares','a')+
        rr('Bundles (3/square)',Math.ceil(withWaste*3)+' bundles');
    }
    function drawRoof(){
      var cv=document.getElementById('rfCv');if(!cv)return;
      var W=cv.clientWidth||500;cv.width=W;cv.height=220;
      var ctx=cv.getContext('2d');ctx.clearRect(0,0,W,220);
      var BL=+gv('rfL')||40,BW=+gv('rfW')||30,pitch=+gv('rfP')||6,ov=+gv('rfOv')||1;
      var halfW=(BW/2+ov),peakH=halfW*pitch/12,totalW=BW+ov*2;
      var PAD=40,sc=Math.min((W-PAD*2)/totalW,(170)/(peakH+30));
      var baseW=totalW*sc,peakY=peakH*sc;
      var ox=(W-baseW)/2,baseY=30+peakY;
      var wallH=Math.min(40,peakY*0.4+10);
      ctx.fillStyle='#D6E4F0';ctx.strokeStyle='#1F3864';ctx.lineWidth=1.5;
      ctx.fillRect(ox,baseY,baseW,wallH);ctx.strokeRect(ox,baseY,baseW,wallH);
      ctx.fillStyle='#EBF3FB';
      ctx.beginPath();ctx.moveTo(ox,baseY);ctx.lineTo(W/2,baseY-peakY);ctx.lineTo(ox+baseW,baseY);ctx.closePath();ctx.fill();
      ctx.strokeStyle='#1F3864';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(ox,baseY);ctx.lineTo(W/2,baseY-peakY);ctx.lineTo(ox+baseW,baseY);ctx.stroke();
      ctx.strokeStyle='#1565C0';ctx.lineWidth=2.5;
      var ridgeW=Math.min(60,baseW*0.2);
      ctx.beginPath();ctx.moveTo(W/2-ridgeW,baseY-peakY);ctx.lineTo(W/2+ridgeW,baseY-peakY);ctx.stroke();
      ctx.font='bold 12px Segoe UI,sans-serif';
      ctx.fillStyle='#1F3864';ctx.textAlign='center';
      ctx.fillText('Pitch: '+pitch+'/12',W/2,baseY-peakY-10);
      ctx.font='11px Segoe UI,sans-serif';ctx.fillStyle='#718096';
      ctx.fillText(BW+"' wide × "+BL+"' long",W/2,baseY+wallH+18);
    }
    g('pg').addEventListener('click',function(e){if(e.target.id==='rfCalc')calc();});
    g('pg').addEventListener('input',function(){calc();drawRoof();});
    g('pg').addEventListener('change',function(){calc();drawRoof();});
    calc();drawRoof();
    window.addEventListener('resize',drawRoof);
  }
};

// ── Construction: Slope ───────────────────────────────────────────────────────
CALCS['Slope']={
  html:function(){return(
    '<h1 class="pt">Slope Calculator</h1><p class="ps">Convert between angle, percentage, and rise/run &mdash; fill any two</p>'+
    '<div class="t2">'+
    card('SLOPE VALUES',
      '<div class="fr"><label>Rise (vertical)</label><input id="slRise" type="number" placeholder="leave blank to solve"></div>'+
      '<div class="fr"><label>Run (horizontal)</label><input id="slRun" type="number" placeholder="leave blank to solve"></div>'+
      '<div class="fr"><label>Angle (degrees)</label><input id="slAng" type="number" placeholder="leave blank to solve" step="0.1"></div>'+
      '<div class="fr"><label>Grade / Slope (%)</label><input id="slPct" type="number" placeholder="leave blank to solve" step="0.1"></div>'+
      '<div class="br"><button class="btn bc" id="slCalc">Calculate</button></div>')+
    card('RESULTS','<div id="slRes"></div>')+
    '</div>'+
    '<canvas id="slCv" style="width:100%;height:220px;border-radius:8px;background:#f0f4f8;display:block;margin-top:14px"></canvas>');},
  init:function(){
    function n(id){var v=gv(id);return v!==''?+v:null;}
    function calc(){
      var rise=n('slRise'),run=n('slRun'),ang=n('slAng'),pct=n('slPct');
      var slope;
      if(rise!==null&&run!==null&&run!==0)slope=rise/run;
      else if(ang!==null)slope=Math.tan(ang*Math.PI/180);
      else if(pct!==null)slope=pct/100;
      else{g('slRes').innerHTML='<div style="color:var(--mu)">Fill in at least two values.</div>';return;}
      if(slope===null)return;
      var calcAng=Math.atan(slope)*180/Math.PI;
      var calcPct=slope*100;
      if(rise===null&&run!==null)rise=run*slope;
      else if(run===null&&rise!==null)run=rise/slope;
      else if(rise===null&&run===null){rise=slope;run=1;}
      g('slRes').innerHTML=
        rr('Angle',fmtN(calcAng,3)+'\u00b0','a')+
        rr('Grade / Slope',fmtN(calcPct,2)+'%','a')+
        rr('Rise : Run',fmtN(rise,3)+' : '+fmtN(run,3))+
        rr('Ratio (1 in X)','1 in '+fmtN(1/slope,2))+
        rr('Hypotenuse',fmtN(Math.sqrt(rise*rise+run*run),3)+' (same units)');
    }
    function drawSlope(){
      var cv=document.getElementById('slCv');if(!cv)return;
      var W=cv.clientWidth||500;cv.width=W;cv.height=220;
      var ctx=cv.getContext('2d');ctx.clearRect(0,0,W,220);
      var rise=parseFloat((g('slRise')||{value:'0'}).value)||0;
      var run=parseFloat((g('slRun')||{value:'0'}).value)||0;
      var ang=parseFloat((g('slAng')||{value:'0'}).value)||0;
      var pct=parseFloat((g('slPct')||{value:'0'}).value)||0;
      if(rise&&run){ang=Math.atan(rise/run)*180/Math.PI;}
      else if(ang){var s=Math.tan(ang*Math.PI/180);if(!run)run=1;rise=run*s;}
      else if(pct){if(!run)run=1;rise=run*pct/100;ang=Math.atan(pct/100)*180/Math.PI;}
      if(!rise||!run)return;
      var PAD=50,sc=Math.min((W-PAD*2)/run,(170)/rise);
      var rw=run*sc,rh=rise*sc;
      var ox=PAD,oy=210-PAD;
      ctx.fillStyle='#EBF3FB';
      ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+rw,oy);ctx.lineTo(ox+rw,oy-rh);ctx.closePath();ctx.fill();
      ctx.strokeStyle='#1F3864';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+rw,oy);ctx.lineTo(ox+rw,oy-rh);ctx.closePath();ctx.stroke();
      ctx.strokeStyle='#1565C0';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+rw,oy-rh);ctx.stroke();
      ctx.strokeStyle='#276749';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(ox,oy,24,-(ang*Math.PI/180),0);ctx.stroke();
      ctx.font='bold 12px Segoe UI,sans-serif';
      ctx.fillStyle='#1F3864';ctx.textAlign='center';
      ctx.fillText('Run: '+run.toFixed(2),ox+rw/2,oy+18);
      ctx.save();ctx.translate(ox+rw+8,oy-rh/2);
      ctx.fillStyle='#1565C0';ctx.textAlign='left';
      ctx.fillText('Rise: '+rise.toFixed(2),0,0);ctx.restore();
      ctx.fillStyle='#276749';ctx.textAlign='left';
      ctx.fillText(ang.toFixed(1)+'\u00b0',ox+28,oy-8);
    }
    g('pg').addEventListener('click',function(e){if(e.target.id==='slCalc')calc();});
    g('pg').addEventListener('input',function(){calc();drawSlope();});
    calc();drawSlope();
    window.addEventListener('resize',drawSlope);
  }
};

// ── Construction: Stairs ──────────────────────────────────────────────────────
CALCS['Stairs']={
  html:function(){return(
    '<h1 class="pt">Stair Calculator</h1><p class="ps">Riser &amp; tread sizing with IRC code compliance check</p>'+
    '<div class="t2">'+
    card('STAIR DETAILS',
      '<div class="fr"><label>Total Rise (in)</label><input id="stTR" type="number" value="108"></div>'+
      '<div class="fr"><label>Desired Riser Height (in)</label><input id="stRH" type="number" value="7" step="0.25"></div>'+
      '<div class="fr"><label>Stair Width (in)</label><input id="stW" type="number" value="36"></div>'+
      '<div class="br"><button class="btn bc" id="stCalc">Calculate</button></div>')+
    card('RESULTS','<div id="stRes"></div>')+
    '</div>'+
    card('IRC CODE REFERENCE',
      '<div style="font-size:12px;line-height:1.8;color:var(--mu)">'+
      '<b>Max Riser Height:</b> 7\u00be" (7.75")<br>'+
      '<b>Min Tread Depth:</b> 10"<br>'+
      '<b>Min Stair Width:</b> 36"<br>'+
      '<b>Headroom:</b> 6\u2019-8" minimum<br>'+
      '<b>Handrail:</b> Required when 4+ risers</div>')+
        '<canvas id="stCv" style="width:100%;height:220px;border-radius:8px;background:#f0f4f8;display:block;margin-top:14px"></canvas>');},
  init:function(){
    function calc(){
      var totalRise=+gv('stTR'),desiredRiser=+gv('stRH'),width=+gv('stW');
      if(!totalRise||!desiredRiser)return;
      var numRisers=Math.round(totalRise/desiredRiser);
      var actualRiser=totalRise/numRisers;
      var tread=Math.max(10,24-actualRiser);
      var totalRun=(numRisers-1)*tread;
      var riserOk=actualRiser<=7.75;
      var treadOk=tread>=10;
      var widthOk=width>=36;
      function check(ok,val,req){return '<span style="color:'+(ok?'var(--ok)':'#C53030')+'">'+(ok?'\u2713':'\u2717')+' '+val+' (req: '+req+')</span>';}
      g('stRes').innerHTML=
        rr('Number of Risers',numRisers,'a')+
        rr('Number of Treads',numRisers-1)+
        rr('Actual Riser Height',fmtN(actualRiser,3)+'" '+check(riserOk,fmtN(actualRiser,2)+'"','\u22647.75"'))+
        rr('Tread Depth (suggested)',fmtN(tread,1)+'" '+check(treadOk,fmtN(tread,1)+'"','\u226510"'))+
        rr('Total Run',fmtN(totalRun/12,2)+"' ("+fmtN(totalRun,1)+'")')+
        rr('Stair Width',fmtN(width,0)+'" '+check(widthOk,width+'"','\u226536"'))+
        rr('Handrail Required',numRisers>=4?'Yes (\u2265 4 risers)':'No');
    }
    function drawStairs(){
      var cv=document.getElementById('stCv');if(!cv)return;
      var W=cv.clientWidth||500;cv.width=W;cv.height=220;
      var ctx=cv.getContext('2d');ctx.clearRect(0,0,W,220);
      var totalRise=+gv('stTR')||108,desRiser=+gv('stRH')||7;
      var nRisers=Math.round(totalRise/desRiser)||1;
      var riser=totalRise/nRisers;
      var tread=Math.max(10,24-riser);
      var show=Math.min(nRisers-1,12);if(show<1)return;
      var PAD=40,sc=Math.min((W-PAD*2)/(show*tread),170/(nRisers*riser));
      var tw=tread*sc,rh=riser*sc,ox=PAD,oy=205;
      ctx.strokeStyle='#CBD5E0';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(ox-5,oy);ctx.lineTo(ox+show*tw+5,oy);ctx.stroke();
      ctx.fillStyle='#EBF3FB';
      ctx.beginPath();ctx.moveTo(ox,oy);
      for(var i=0;i<show;i++){
        ctx.lineTo(ox+i*tw,oy-i*rh);
        ctx.lineTo(ox+i*tw,oy-(i+1)*rh);
        ctx.lineTo(ox+(i+1)*tw,oy-(i+1)*rh);
      }
      ctx.lineTo(ox+show*tw,oy);ctx.closePath();ctx.fill();
      ctx.strokeStyle='#1F3864';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(ox,oy);
      for(var i=0;i<show;i++){
        ctx.lineTo(ox+i*tw,oy-i*rh);
        ctx.lineTo(ox+i*tw,oy-(i+1)*rh);
        ctx.lineTo(ox+(i+1)*tw,oy-(i+1)*rh);
      }
      ctx.stroke();
      ctx.font='bold 10px Segoe UI,sans-serif';
      ctx.fillStyle='#1565C0';ctx.textAlign='center';
      ctx.fillText(riser.toFixed(2)+'"',ox+tw*0.1,oy-rh/2);
      ctx.fillStyle='#1F3864';
      ctx.fillText(tread.toFixed(1)+'"',ox+tw/2,oy+14);
      ctx.font='11px Segoe UI,sans-serif';ctx.fillStyle='#718096';
      ctx.fillText(nRisers+' risers  •  '+show+' treads shown',W/2,18);
    }
    g('pg').addEventListener('click',function(e){if(e.target.id==='stCalc')calc();});
    g('pg').addEventListener('input',function(){calc();drawStairs();});
    calc();drawStairs();
    window.addEventListener('resize',drawStairs);
  }
};

// ── Construction: Volume ──────────────────────────────────────────────────────
CALCS['Volume']={
  html:function(){return(
    '<h1 class="pt">Volume Calculator</h1><p class="ps">Box, cylinder, sphere, cone &mdash; cubic feet and yards</p>'+
    '<div class="t2">'+
    card('SHAPE',
      '<div class="fr"><label>Shape</label>'+
      '<select id="volSh"><option>Box / Rectangular</option><option>Cylinder</option>'+
      '<option>Sphere</option><option>Cone</option><option>Pyramid</option></select></div>'+
      '<div id="volFl"></div>'+
      '<div class="br"><button class="btn bc" id="volCalc">Calculate</button></div>')+
    card('RESULTS','<div id="volRes"></div>')+
    '</div>');},
  init:function(){
    var shapes={
      'Box / Rectangular':[['Length (ft)','vlL'],['Width (ft)','vlW'],['Height (ft)','vlH']],
      Cylinder:[['Radius (ft)','vlR'],['Height (ft)','vlH2']],
      Sphere:[['Radius (ft)','vlR2']],
      Cone:[['Radius (ft)','vlR3'],['Height (ft)','vlH3']],
      Pyramid:[['Base Length (ft)','vlBL'],['Base Width (ft)','vlBW'],['Height (ft)','vlH4']]
    };
    function renderF(){
      var s=gv('volSh');
      g('volFl').innerHTML=(shapes[s]||[]).map(function(f){
        return '<div class="fr"><label>'+f[0]+'</label><input id="'+f[1]+'" type="number" placeholder="0"></div>';
      }).join('');
    }
    function calc(){
      var s=gv('volSh'),ft3;
      try{
        if(s==='Box / Rectangular')ft3=+gv('vlL')*+gv('vlW')*+gv('vlH');
        else if(s==='Cylinder')ft3=Math.PI*+gv('vlR')*+gv('vlR')*+gv('vlH2');
        else if(s==='Sphere')ft3=4/3*Math.PI*Math.pow(+gv('vlR2'),3);
        else if(s==='Cone')ft3=Math.PI/3*+gv('vlR3')*+gv('vlR3')*+gv('vlH3');
        else if(s==='Pyramid')ft3=+gv('vlBL')*+gv('vlBW')*+gv('vlH4')/3;
      }catch(e){}
      if(!ft3||ft3<=0)return;
      var yd3=ft3/27,in3=ft3*1728,gallons=ft3*7.48052;
      g('volRes').innerHTML=
        rr('Cubic Feet',fmtN(ft3,4)+' ft\u00b3','a')+
        rr('Cubic Yards',fmtN(yd3,4)+' yd\u00b3')+
        rr('Cubic Inches',fmtN(in3,2)+' in\u00b3')+
        rr('Gallons',fmtN(gallons,2)+' gal')+
        rr('Liters',fmtN(ft3*28.3168,2)+' L');
    }
    g('pg').addEventListener('click',function(e){if(e.target.id==='volCalc')calc();});
    g('pg').addEventListener('change',function(e){if(e.target.id==='volSh')renderF();});
    g('pg').addEventListener('input',calc);
    renderF();
  }
};
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(function(){});
